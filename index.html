<style>
  :root{--radius:18px;--tabbar-h:74px;--maxw:520px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);font-size:16px;
    --paper:#FCFAF6;--text:#2B2620;--text-soft:#7A6F60;--text-faint:#B6AB99;--card:#fff;--line:#EEE7DB;--line-soft:#F5F0E7;--input-bg:#F6F1E8;
    --display:"Playfair Display",Georgia,serif;--serif:'Manrope',-apple-system,sans-serif;
    --c:#A8763E;--c-soft:rgba(168,118,62,.12);--c-mark:rgba(168,118,62,.30);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  body{font-family:'Manrope',-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;background:#EFE9DF;color:var(--text);}
  #app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--paper);position:relative;display:flex;flex-direction:column;}
  .serif{font-family:var(--serif);}

  .topbar{position:sticky;top:0;z-index:20;background:rgba(252,250,246,.86);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);
    padding:calc(var(--safe-t) + 13px) 18px 12px;display:flex;align-items:center;gap:14px;min-height:54px;border-bottom:1px solid var(--line-soft);}
  .topbar.hidden{display:none;}
  .back{width:38px;height:38px;flex:0 0 38px;border-radius:50%;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);transition:transform .12s;}
  .back:active{transform:scale(.9);}
  .topbar h1{font-size:1.2rem;font-weight:400;margin:0;}
  .topbar .eyebrow{font-size:.68rem;color:var(--text-faint);font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin:0 0 1px;}

  .view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tabbar-h) + var(--safe-b) + 24px);}
  .pad{padding:0 18px;}

  .pcover::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(rgba(255,255,255,.34),transparent 28%, transparent 72%, rgba(60,44,28,.42));}
  .pcover > *{position:relative;z-index:2;}
  .pcover .handle{padding:26px 24px 0;font-size:.66rem;letter-spacing:.05em;font-weight:500;color:#2c2620;text-shadow:0 1px 14px rgba(255,255,255,.5);}
  .pcover .ctitle{padding:8px 24px 0;font-family:var(--display);font-weight:400;font-size:2.4rem;line-height:1.04;color:#2c2620;text-shadow:0 1px 18px rgba(255,255,255,.5);}
  .pcover .ctitle em{display:block;font-style:italic;font-weight:500;}
  .pcover .name{margin-top:auto;padding:0 24px 22px;text-align:center;font-size:.62rem;letter-spacing:.2em;font-weight:600;color:#fdfcf9;text-shadow:0 1px 14px rgba(40,30,18,.5);}

  .section-label{font-size:.7rem;color:var(--text-faint);font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin:24px 0 8px;}

  /* lesson list */
  .lrows{display:flex;flex-direction:column;}
  .lrow{display:flex;align-items:baseline;gap:13px;width:100%;text-align:left;border:none;background:transparent;padding:15px 2px;cursor:pointer;border-bottom:1px solid var(--line-soft);transition:opacity .12s;}
  .lrow:last-child{border-bottom:none;}
  .lrow:active{opacity:.55;}
  .lrow .rn{flex:0 0 18px;width:18px;font-size:.78rem;color:var(--text-faint);font-weight:600;}
  .lrow .lb{flex:1;min-width:0;}
  .lrow .lt{font-family:var(--serif);font-size:1.2rem;font-weight:600;line-height:1.16;letter-spacing:-.01em;}
  .lrow .lm{display:block;font-size:.8rem;color:var(--text-faint);margin-top:2px;}

  /* lesson detail */
  .l-head{background:var(--c-soft);padding:26px 22px 24px;}
  .l-head .l-eyebrow{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-soft);}
  .l-head h2{font-family:var(--serif);font-size:2.05rem;font-weight:600;letter-spacing:-.02em;margin:8px 0 0;line-height:1.06;color:var(--c);}
  .l-head .l-q{font-family:var(--serif);font-weight:500;font-size:1.06rem;margin:12px 0 0;color:var(--text);}

  .tabs{display:flex;gap:7px;padding:16px 18px 4px;}
  .tab{flex:1;border:1px solid var(--line);background:transparent;color:var(--text-soft);font-family:inherit;font-size:.9rem;font-weight:600;padding:11px 0;border-radius:12px;cursor:pointer;transition:all .14s;}
  .tab.active{background:var(--c);border-color:transparent;color:#fff;}
  .tab:active{transform:scale(.97);}

  .content{padding:18px 18px 8px;}
  .content p{margin:0 0 14px;font-size:1.02rem;line-height:1.62;color:var(--text);font-family:var(--serif);}
  .content h3{font-family:var(--serif);font-size:1.25rem;font-weight:600;letter-spacing:-.01em;margin:24px 0 10px;color:var(--text);}
  .content ul{margin:0 0 14px;list-style:none;}
  .content ul li{position:relative;padding-left:22px;margin:0 0 10px;font-size:1.02rem;line-height:1.55;color:var(--text);font-family:var(--serif);}
  .content ul li::before{content:"";position:absolute;left:2px;top:.62em;width:8px;height:8px;border-radius:50%;background:var(--c);}
  .mark{background:linear-gradient(transparent 56%, var(--c-mark) 56%);padding:0 .06em;}

  .placeholder{border:1px dashed var(--line);border-radius:var(--radius);padding:22px;color:var(--text-soft);font-size:.96rem;background:var(--card);}
  .placeholder .ph-tag{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  .empty{text-align:center;padding:54px 24px;color:var(--text-faint);}
  .empty .ring{width:54px;height:54px;border-radius:50%;margin:0 auto 16px;background:var(--c-soft);display:flex;align-items:center;justify-content:center;color:var(--c);}
  .empty p{margin:0;font-size:1rem;}

  .ex{border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin:0 0 16px;background:var(--card);}
  .ex-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
  .ex-idx{flex:0 0 26px;width:26px;height:26px;border-radius:50%;background:var(--c);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.85rem;margin-top:1px;}
  .ex-prompt{font-size:1.05rem;font-weight:500;flex:1;}
  .ex-note{font-size:.9rem;color:var(--text-soft);margin:0 0 12px;font-family:var(--serif);}
  textarea.ex-input{width:100%;min-height:118px;resize:vertical;border:1px solid var(--line);border-radius:12px;padding:13px;font-family:var(--serif);font-size:1.02rem;color:var(--text);line-height:1.55;background:var(--input-bg);transition:border-color .15s;}
  textarea.ex-input:focus{outline:none;border-color:var(--c);}
  .scale{display:flex;gap:8px;}
  .scale button{flex:1;aspect-ratio:1;border:1px solid var(--line);background:var(--input-bg);border-radius:12px;font-family:var(--serif);font-size:1.1rem;color:var(--text-soft);cursor:pointer;transition:all .12s;}
  .scale button.on{background:var(--c);border-color:var(--c);color:#fff;}
  .scale button:active{transform:scale(.94);}
  .ex-foot{display:flex;align-items:center;gap:7px;margin-top:11px;min-height:18px;color:var(--text-faint);font-size:.8rem;}
  .ex-foot.saved{color:var(--c);}

  .epc{display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:var(--radius);padding:14px 16px;margin:0 0 12px;cursor:pointer;transition:opacity .12s;}
  .epc:active{opacity:.6;}
  .epc .num-chip{width:34px;height:34px;flex:0 0 34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);color:#fff;font-size:1.02rem;}
  .epc-body{flex:1;min-width:0;}
  .epc-title{font-family:var(--serif);font-weight:600;font-size:1.08rem;letter-spacing:-.01em;}
  .epc-meta{font-size:.82rem;color:var(--text-faint);margin-top:1px;}
  .epc-ring{width:40px;height:40px;flex:0 0 40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:600;font-family:var(--serif);}

  .org-block{margin:0 0 14px;border:1px solid var(--line);border-radius:var(--radius);padding:18px;background:var(--card);}
  .org-block h3{font-family:var(--serif);margin:0 0 4px;font-size:1.3rem;font-weight:500;}
  .org-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--line-soft);}
  .org-row:last-child{border-bottom:none;}
  .or-ico{flex:0 0 30px;width:30px;height:30px;border-radius:9px;background:var(--c);color:#fff;display:flex;align-items:center;justify-content:center;}
  .or-k{font-size:.78rem;color:var(--text-faint);}
  .or-v{font-size:1.02rem;font-weight:600;}
    .bound li{margin-bottom:11px;}
  .acc{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);margin:0 0 12px;overflow:hidden;}
  .acc-h{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:17px 18px;font-family:var(--serif);font-size:1.16rem;font-weight:600;color:var(--text);transition:background .12s,color .15s;}
  .acc-h:active{background:var(--line-soft);}
  .acc-ic{flex:0 0 auto;color:var(--text-faint);display:flex;transition:transform .25s ease;}
  .acc.open .acc-ic{transform:rotate(180deg);color:var(--c);}
  .acc.open .acc-h{color:var(--c);}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .32s ease;}
  .acc.open .acc-body{max-height:1400px;}
  .content .quote{font-family:var(--serif);font-style:italic;font-size:1.16rem;line-height:1.5;color:var(--c);border-left:3px solid var(--c);padding-left:14px;margin:20px 0 6px;}
  .content .quote span{display:block;font-style:normal;font-size:1rem;color:var(--text);margin-top:8px;}
  .fld{margin:0 0 15px;}
  .fld-label{font-family:var(--serif);font-weight:600;font-size:1.02rem;color:var(--text);margin-bottom:4px;}
  .fld-note{font-family:var(--serif);font-size:.9rem;color:var(--text-soft);margin-bottom:7px;line-height:1.35;}
  .fld-head{font-family:var(--serif);font-weight:700;font-size:.74rem;color:var(--text);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 9px;}
  .fld-step{display:flex;gap:11px;align-items:flex-start;margin:0 0 11px;}
  .fld-step-n{flex:0 0 22px;width:22px;height:22px;border-radius:50%;background:var(--c);color:#fff;font-family:var(--serif);font-weight:700;font-size:.78rem;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .fld-step-t{flex:1;font-family:var(--serif);font-size:.95rem;color:var(--text);line-height:1.45;}
  .fld-head:first-child{margin-top:2px;}
  .ckgroup{margin:6px 0 4px;}
  .ckg-title{font-family:var(--serif);font-weight:600;font-size:.98rem;color:var(--text-soft);margin:14px 0 5px;}
  .ckitem{display:flex;gap:11px;align-items:flex-start;padding:6px 0;cursor:pointer;}
  .ckitem input{position:absolute;opacity:0;width:0;height:0;}
  .ckbox{flex:0 0 21px;width:21px;height:21px;border:1.6px solid var(--line);border-radius:6px;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .12s;}
  .ckitem input:checked + .ckbox{background:var(--c);border-color:var(--c);}
  .ckbox svg{opacity:0;transition:opacity .12s;}
  .ckitem input:checked + .ckbox svg{opacity:1;}
  .cktext{flex:1;font-family:var(--serif);font-size:1rem;line-height:1.34;color:var(--text);}
  .split{margin-top:6px;}
  .split-top{text-align:center;margin-bottom:4px;}
  .split-seed{display:inline-block;background:var(--c);color:#fff;font-weight:600;padding:6px 16px;border-radius:20px;font-size:.96rem;font-family:var(--serif);}

  {n:1,title:"Созависимость",q:"Почему я не могу просто уйти?",c:"#7B8C4A",video:"https://disk.yandex.com/i/O-j6_fs4o90Jnw",videoMeta:"Яндекс Диск",unlock:"2026-06-14T14:00",pass:"2026",content:`<p style="font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 16px">Созависимость как динамика</p><h3>Формат</h3><p>Встречи, где я делюсь своим взглядом, материалом, упражнениями и наблюдениями. Это не групповая терапия и не замена личной терапии или кризисной помощи.</p><h3>О симптоме</h3><p>Победа — не стереть симптом, а научиться его регулировать.</p><p>Я не верю в чёткое «до» и «после» и в тотальное исцеление: победа — когда симптом перестаёт разрушать жизнь и становится тем, что я умею замечать, понимать и регулировать.</p><h3>Что такое симптом</h3><p>Это не травма из прошлого. Это динамика.</p><p>Определённый способ реагировать: мыслями, чувствами, поведением, телом, нервной системой и гормонами.</p><h3>Что включает динамику</h3><ul><li>условия</li><li>триггеры</li><li>отношения</li><li>внутренние установки</li><li>перегрузка</li><li>потеря контакта с собой</li></ul><h3>Как это выглядит — пример</h3><ul><li>неподходящая компания → абьюзивный режим</li><li>подавленная агрессия → анорексия</li><li>жизнь на автомате → переедание</li><li>нарушенные границы → депрессия</li><li>непереносимое напряжение → ковыряю лицо</li></ul><h3>Наша задача</h3><p>Не искоренить симптом, а научиться обращаться с собой так, чтобы справляться без него.</p><p>При этом симптом остаётся важным маркером качества психического, физического и ментального состояния.</p><h3>Созависимая фантазия</h3><p>Вера, что однажды не станет боли, страха и внутренних конфликтов.</p><p>Та же мечта о слиянии: партнёр, терапевт или курс наконец избавит от тяжести жить. Именно она делает нас уязвимыми перед обещаниями «исцеления раз и навсегда».</p><h3>За любым симптомом — одно и то же</h3><p>Человек не умеет с собой обращаться.</p><p>Либо не знает себя, либо знает, но не учитывает. Нет контакта с собой — нет опоры.</p><div class="quote">«Вернись к себе. Узнай себя. Научись с собой обращаться.»<span>Симптом — не враг. Это и есть главная задача наших встреч.</span></div>`,contentMeta:"Тема: созависимость как динамика",

  {n:2,title:"Слияние",q:"Почему я теряю себя в отношениях?",c:"#C97A35",video:"https://disk.yandex.ru/i/s5r-jVge0AiyHg",videoMeta:"Яндекс Диск",unlock:"2026-06-21T14:00",pass:"2026",content:`<h3>Что такое слияние</h3><p>Слияние: состояние отсутствия границы между мной и чем-то (человеком, делом, ощущением, идеей). Похоже на растворение: мы чувствуем единство, но при этом теряем ясность отдельности.</p><p>Примеры из жизни: Инстаграм, переедание, конфликт.</p><p>Когда слияние помогает:</p><ul><li>в начале отношений: близость и доверие;</li><li>в творчестве или молитве: поток и вдохновение;</li><li>в детстве: основа ощущения безопасности.</li></ul><p>Когда мешает:</p><ul><li>лишает самостоятельности и авторства;</li><li>делает трудным разрыв или паузу;</li><li>вызывает тревогу и удерживание контакта любой ценой.</li></ul><p>Ресурс: если есть возвращение к себе. Ловушка: если отдельности не наступает.</p><h3>Здоровые формы</h3><p style="font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 12px">слияние как опыт, а не место жительства</p><p>секс · танец · объятия после разлуки · совместное проживание сильного чувства · музыка · пение · молитва · медитация в группе · «меня понимают»</p><p>Проблема не когда слияние возникает, а когда из него не выйти. Здоровый цикл: отдельность, близость, слияние, отдельность.</p><h3>Слияние в созависимости</h3><p style="font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 12px">безопасная перемешанность</p><p>Здоровое слияние приходит в гости, а в созависимости остаётся жить: я слита не на время, а насовсем, и выхода нет. «Я пользуюсь чужими ресурсами и избегаю ответственности.» Это ощущается безопасно, и цена этой безопасности: я сама. В таком доме постепенно стирается своё: мнение, желания, вещи, расписание, тело.</p><h3>Пять опор: на чём держится слияние</h3><ul><li>Слепота к границе: не отличаю свой сигнал от чужого, двигаюсь в чужом ритме как в своём.</li><li>Страх исчезновения: отделиться переживается не как «грустно», а как «меня не станет».</li><li>Полое «я»: внутри не на что встать, опору беру у другого: «кто я» только рядом с ним.</li><li>Ответственность за него: его состояние это моя работа; ему плохо, значит я виновата или должна починить.</li><li>Идеализация-дефицит: он раздут до незаменимого, значимее, чем есть, и «такого больше не будет».</li><li>Возбуждение: частая краска, но не опора; интенсивность путается с любовью.</li></ul><h3>Идеализация</h3><p>Старт: дефицит («без другого меня будто нет»). Дальше я раздуваю другого до источника: он растёт, я уменьшаюсь. Три условия, без которых слияние не складывается: достаточно большой (есть куда исчезнуть); достаточно полный (есть чем наполниться); без отдельности (остался гладкий образ). Результат: слияние.</p><p>Оборотная сторона: идеал на живом человеке не держится, и начинается обесценивание. Качели идеализация и обесценивание.</p><h3>Роль в детстве</h3><p>Слияние: первая и необходимая форма существования. Новорождённый ещё не отделяет себя от мамы, слияние буквально держит ребёнка в жизни. В норме из него вырастают четыре линии:</p><ul><li>Выживание и безопасность → базовое чувство безопасности, опора;</li><li>Со-регуляция → из неё вырастает саморегуляция;</li><li>Базовое доверие → способность опираться на людей;</li><li>Ощущение «я есть» → самоощущение и самоценность.</li></ul><p>Путь: слияние, различение, отделение. Сначала должно быть из чего отделяться.</p><p>При дефиците: что не стало внутренней функцией, то остаётся жить в другом человеке. Безопасность начинает жить не внутри, а в другом; внутренний успокаивающий механизм не складывается; связь надо непрерывно зарабатывать или караулить; ощущение себя остаётся зыбким. Созависимость: не слабость характера, а функция, которую так и не удалось внести внутрь.</p><h3>Где вы себя узнали</h3><p style="font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 12px">синхронизация</p><ul><li>Выживание и безопасность: «я в безопасности, только когда ты рядом»;</li><li>Со-регуляция: настроение близкого мгновенно становится моим; успокаиваюсь только через другого;</li><li>Базовое доверие: «я заслуживаю любовь тем, что нужен и полезен»; любовь нужно контролировать;</li><li>Ощущение «я есть»: «я существую, только когда меня видят»; без отношений я будто исчезаю.</li></ul><h3>Зоны незрелости</h3><p>Все феномены слияния указывают на зоны нашей незрелости. Феномен слияния не обвиняет, он показывает: вот здесь ты ещё не родилась отдельно. Выход из любой зависимости это взросление.</p><p>Зрелость: множество маленьких выходов из разных форм слияния. Она не наступает целиком, а набирается по чуть-чуть, в конкретных точках. Каждый такой выход телесный; в нём всегда есть секунда страха или вины: если я отделюсь, потеряю, стану плохой, останусь одна. Выход случается, когда выдерживаешь это и всё равно остаёшься собой. Незрелое слияние: то, из которого нет выхода.</p><h3>Страх выйти: фрустрация и тревога</h3><p>Почему мы застреваем: психика застряла на «если я отпущу, я не переживу». Это мы уже видели у мамы: нет внутренней опоры (нечем выдержать паузу, расстояние, отсутствие) и нет опыта отдельности (наедине с собой плохо). Разбираем сейчас: психика не умеет переживать неполучение (это фрустрация) и паника при расставании (это тревога). Ужас держится на трёх вопросах: с кем я останусь; что я буду кушать (эмоционально); как я буду справляться с невыносимыми чувствами.</p><p>Фрустрация: состояние, когда я чего-то хочу, но не получаю. Например: хочу внимания, но его нет; хочу, чтобы меня понимали, но меня не слышат; хочу любви, но сталкиваюсь с холодом или отказом. Это чувство неудовлетворённости и внутреннего напряжения. Именно через посильную фрустрацию ребёнок учится выдерживать реальность: не всё происходит тогда и так, как хочется. Желание плюс невозможность сразу удовлетворить даёт фрустрацию. В зрелых отношениях выдерживать фрустрацию значит оставаться в контакте с собой, даже когда другой не даёт того, чего хочется.</p><p>Как учиться выдерживать:</p><ul><li>признать чувство («да, я хочу этого, и сейчас не получаю»);</li><li>оставаться с собой (не заливать пустоту едой или случайным);</li><li>искать реальные способы (иногда можно иначе или позже);</li><li>выдерживать паузу (в паузе между «хочу» и «получаю» рождается зрелость).</li></ul><p>Это возможно при хорошей маме внутри и достаточной сытости.</p><p>Тревога при слиянии бывает двух источников: потеря себя (я зафиксировалась на другом; вернуть внимание к себе, в тело) и потеря контроля (пытаюсь управлять, менять его; признать бессилие, отпустить). В обоих случаях ключ: отцепиться от другого и вернуться к себе.</p><h3>Анонимные созависимые (CODA)</h3><p>Бесплатное анонимное сообщество выздоровления по программе 12 шагов. Признать бессилие: первый и самый непростой шаг. Собрания во многих городах России и онлайн.</p><p>Россия и онлайн: <a href="https://codarus.org" target="_blank" rel="noopener" style="color:var(--c);font-weight:600;text-decoration:underline;text-underline-offset:2px">codarus.org</a> · международный: <a href="https://coda.org" target="_blank" rel="noopener" style="color:var(--c);font-weight:600;text-decoration:underline;text-underline-offset:2px">coda.org</a> · Москва: <a href="https://coda-msk.ru" target="_blank" rel="noopener" style="color:var(--c);font-weight:600;text-decoration:underline;text-underline-offset:2px">coda-msk.ru</a> · Санкт-Петербург: <a href="https://coda-spb.ru" target="_blank" rel="noopener" style="color:var(--c);font-weight:600;text-decoration:underline;text-underline-offset:2px">coda-spb.ru</a>, тел. 8 911 928-67-10.</p><h3>Этажи и ловушки</h3><p>Вспомни случай, когда хотелось отделиться, и не получилось. Где всё сорвалось? Это поможет найти свой этаж:</p><ul><li>Тело: знание есть, а движения нет, тело не двинулось. Держит ниже слов.</li><li>Ум: голова переуговаривает: сомнения, оправдания, прокрутка. Держит логикой.</li><li>Психика: поднимается невыносимое чувство, и ты сливаешься обратно. Держит болью.</li></ul><p>Ловушки этажа «тело»:</p><ul><li>падение («встану и не на чем стоять»);</li><li>исчезновение («отлеплюсь и меня не станет»);</li><li>пустота вокруг («выйду в вакуум»);</li><li>беззащитность («окажусь на виду, под удар»);</li><li>холод («там одной холодно, а тут тепло»);</li><li>замирание и хватка (отключка тела; рефлекс вцепиться и не отпускать).</li></ul><p>Ловушки этажа «ум»:</p><ul><li>самообвинение («я эгоистка»);</li><li>смягчение («надо было мягче»);</li><li>чтение мыслей («он наверняка подумал…»);</li><li>катастрофизация («если отделюсь, всё рухнет»);</li><li>прокрутка и оправдание (анализ вместо движения; «мне так и лучше»);</li><li>долженствование («я должна быть рядом, так правильно»).</li></ul><p>Ловушки этажа «психика»:</p><ul><li>страх («бросят, разлюбят, накажут»);</li><li>дефицит («без него я пустая»);</li><li>жадность («хочу быть нужной до конца»);</li><li>вина («займусь собой, предам его»);</li><li>стыд («хотеть своего стыдно»);</li><li>гиперответственность («я отвечаю за его состояние»);</li><li>нужность («существую через незаменимость»);</li><li>контроль («пока слита, всё предсказуемо»);</li><li>надежда («ещё чуть-чуть, и он изменится»);</li><li>неизвестность («не знаю, кто я отдельно»).</li></ul><p>У каждого свой этаж и свой рецепт: если тело, работать телесно (буквальное отделение, регулярность, ритуал, рабочие формы слияния: спорт, танец, тактильность); если ум, познакомиться со своим мышлением и ошибками мышления (утренние страницы, тематические дневники); если психика, встретить и выдержать само чувство (психолог, фильмы, литература, близость с тем, что трогает).</p><h3>Формы и способы выйти</h3><p>Через тело:</p><ul><li>возврат в тело («сканер тела», затем «как я себя чувствую в связи с этим?»);</li><li>переключение восприятия (музыка, прогулка, ароматы);</li><li>движение (спорт, йога, прогулки).</li></ul><p>Через ум:</p><ul><li>пауза (не спешить; пауза перед решением даёт шанс на новый выбор);</li><li>переключение (маленькое дело «под ключ» даёт дофамин и возвращает авторство);</li><li>информация (собрать данные: консультации, опыт других; делясь, выходишь);</li><li>диалог и контакт (прямо говорить с человеком; разговор возвращает ясность).</li></ul><p>Нулевой контакт.</p><p>Через психику (по каждой ловушке):</p><ul><li>страх: пережить страх потери, выдержать отдельность;</li><li>дефицит: встретить пустоту и наполнять её собой;</li><li>жадность: разжать хватку и отпустить;</li><li>вина: вынести вину и всё равно быть;</li><li>стыд: перестать стыдиться «хочу» и «не хочу»;</li><li>гиперответственность: вернуть другому ответственность за его чувства;</li><li>нужность: найти ценность вне роли спасателя;</li><li>контроль: отпустить, что другого не удержать;</li><li>надежда: отгоревать и увидеть его настоящего;</li><li>неизвестность: вынести незнание, узнавать себя заново.</li></ul><div class="quote">Слияние держится не потому, что связь слишком сильная, а потому, что отдельность переживается как опасность. Поэтому задача не в том, чтобы заставить себя отпустить, а в том, чтобы постепенно создавать внутри место, куда можно вернуться.<span>Не оторвать. А дать себе опору.</span></div>`,exercises:[{"id": "sl_mama_a", "section": "exercise", "type": "group", "prompt": "Мама · Какой была моя мама", "fields": [{"id": "sl_mama_a1", "label": "Выживание и безопасность", "ph": "Можно ли было с ней расслабиться?"}, {"id": "sl_mama_a2", "label": "Со-регуляция", "ph": "Успокаивала ли, когда было плохо?"}, {"id": "sl_mama_a3", "label": "Базовое доверие", "ph": "Мои сигналы были важны, их слышали?"}, {"id": "sl_mama_a4", "label": "Ощущение «я есть»", "ph": "Был ли отражающий взгляд?"}]}, {"id": "sl_mama_b", "section": "exercise", "type": "group", "prompt": "Мама · Какая я мама себе", "fields": [{"id": "sl_mama_b1", "label": "Выживание и безопасность", "ph": "Могу ли я расслабиться наедине с собой?"}, {"id": "sl_mama_b2", "label": "Со-регуляция", "ph": "Умею ли я успокаиват   {n:3,title:"Границы",q:"Где заканчиваюсь я и начинается другой?",c:"#7E6AA6",video:"https://disk.yandex.ru/i/VYdeu49ge031fw",videoMeta:"Яндекс Диск",unlock:"2026-06-28T14:00",pass:"2026",content:"<p style=\"font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 16px\">Созависимость заканчивается не тогда, когда исчезает другой. А когда появляешься ты — как отдельный, реальный, устойчивый человек.</p><h3>О чём сегодня</h3><ul><li>Что такое граница и как она формируется</li><li>Виды границ: тело, психика, ум, финансовые</li><li>Кто нарушает границы и что происходит</li><li>Как соблюдать границы: инструменты и принципы</li></ul><h3>Что такое граница</h3><p>Граница — это не броня, а форма.</p><p>Конфликт, защита, отстаивание. Форма, соблюдение.</p><h3>Зачем нужны границы</h3><ul><li>Узор личности — принадлежать себе, уметь с собой обращаться, быть устойчивым;</li><li>Безопасность — опираться на мир, и мир может опираться на тебя; выход из дочки-матери;</li><li>Доступ к агрессии — на защиту себя и на движение к другому;</li><li>Видеть других — если границы есть у меня, значит они есть и у другого; позволить себе отличаться и другому отличаться (конфликт и выдерживание).</li></ul><h3>Узор личности · своя форма</h3><p>Круг — моя форма. Треугольник — как себя веду.</p><p>Созависимый не понимает своей формы или догадывается о ней, но не выдерживает, потому что в детстве форма была непозволительна, за неё стыдили и винили.</p><p>Если человек не проживает свою форму, он выдумывает идеальную, воображаемую форму и опирается на вымышленный образ.</p><p>Отсюда появляются контроль, зависимости, созависимость и различные компенсации.</p><p>Если я круг, но веду себя как треугольник — всё непрожитое прорывается разрушительно.</p><h3>Когда форма есть</h3><p>Когда форма есть, легче принимать решения. Чётко чувствуется, что хорошо, а что плохо, когда начать и когда закончить. Можно опираться на мир, и мир может опираться на тебя.</p><p>Форма цела — есть опора.</p><h3>От слияния к «Я»</h3><ul><li>Оральная стадия · 0–1,5 года — Слияние (прошлая встреча): полностью слит с мамой; базовое доверие, удовлетворение потребностей;</li><li>Анальная стадия · 1,5–3 года — Границы (сегодня): контроль, «не хочу», защищает своё пространство и желание;</li><li>Появляется «Я» (впереди): опора на себя; отдельность от мамы.</li></ul><p>«Я» появляется только тогда, когда появляется «не Я». Без способности сказать «нет» невозможно почувствовать своё «да».</p><h3>Когда форма не сложилась · размытые границы</h3><p>Размывается ощущение:</p><ul><li>где я начинаюсь и где заканчиваюсь;</li><li>как со мной можно, а как нельзя;</li><li>сколько меня — психически и физически;</li><li>что мне больно, а что приятно;</li><li>сколько реальности я вообще могу выдержать.</li></ul><p>Во взрослом возрасте это приводит к потребности во внешней границе — в ком-то, кто будет задавать рамку, защищать. И к огромному внутреннему расколу и подавлению.</p><h3>Задача</h3><p>Узнавание своих границ, размеров, соблюдение своих границ, работа с агрессией, чувством вины, стыда.</p><h3>Ментальные границы</h3><p>Мысли, мнения, ценности, картина мира.</p><p>Граница: моё мнение остаётся моим рядом с твоим. Могу не соглашаться и не разрушаться.</p><p>Как ломается в созависимости:</p><ul><li>сливаюсь с его позицией, теряю свою: «как он считает, так и правильно»;</li><li>не понимаю, чего хочу и что думаю, пока не узнаю, чего хочет он;</li><li>принимаю его слова о себе за правду: «сказал, что истеричка, значит так и есть»;</li><li>несогласие читаю как угрозу разрыва, поэтому молчу;</li><li>жду, что он сам догадается, что у меня в голове, и обижаюсь, что не угадал;</li><li>доказываю и объясняю, будто прошу разрешения думать по-своему.</li></ul><h3>Эмоциональные границы</h3><p>Чувства и ответственность за них.</p><p>Граница: мои чувства мои, твои твои. Я не обязана спасать тебя от твоих состояний.</p><p>Как ломается в созависимости:</p><ul><li>отвечаю за его настроение: он мрачный, значит я виновата и бегу чинить;</li><li>заражаюсь его тревогой и злостью, теряю собственное состояние;</li><li>впитываю его боль как свою, работаю эмоциональной губкой;</li><li>отдаю руль: «это ты меня довёл», «из-за тебя мне плохо»;</li><li>не разрешаю себе радоваться или злиться, если он в другом состоянии;</li><li>чувствую вину за сами свои потребности и эмоции;</li><li>управляю им через обиду и вину, спасаю, чтоб не встречаться со своей тревогой.</li></ul><h3>Физические границы</h3><p>Тело, пространство, прикосновения, время, ресурсы.</p><p>Граница: моё тело и пространство мои. «Да» на близость только тогда, когда правда хочу.</p><p>Как ломается в созависимости:</p><ul><li>соглашаюсь на близость, когда не хочу, лишь бы не потерять его и не злить;</li><li>растворяюсь: нет личного времени, вещей, своего угла, всё общее;</li><li>контролирую телефон и геолокацию и позволяю так же контролировать себя;</li><li>терплю прикосновения и вторжение, которые неприятны;</li><li>сливаю деньги, силы и время в ущерб себе, спонсирую и обслуживаю;</li><li>он входит в любой момент и в любое моё состояние, дверь не закрывается;</li><li>тело сигналит усталостью и болезнями, но я слушаю его, а не себя.</li></ul><h3>Финансовые границы · часть физических</h3><p>Финансовые границы не про то, кто за кого платит.</p><p>Щедрость это отличный язык любви, проявление заботы и ощущение безопасности.</p><p>Граница это про ощущение выбора:</p><ul><li>В данных условиях могу ли я выбирать?</li><li>Могу ли я поступить по-своему?</li><li>Остаюсь ли я отдельным человеком?</li></ul><p>Дело не в сумме, а в том, есть ли у меня выбор. В деньгах созависимость идёт в обе стороны.</p><p>Когда я содержу и спасаю:</p><ul><li>содержу его и оплачиваю его жизнь, чтобы быть нужной;</li><li>влезаю в долги и трачу на него в ущерб себе;</li><li>не могу сказать «нет» на просьбы о деньгах;</li><li>спонсирую и спасаю, а в ответ новые требования;</li><li>покупаю любовь и спокойствие деньгами.</li></ul><p>Когда я завишу от него:</p><ul><li>завишу от его денег и поэтому молчу и терплю;</li><li>нет своих денег, прошу на всё и отчитываюсь;</li><li>не могу уйти, потому что не на что жить;</li><li>отказалась от своего дохода ради отношений;</li><li>не чувствую себя свободной и самостоятельной в деньгах.</li></ul><p>И там, и там пропадает выбор и отдельность.</p><h3>Что я надеюсь получить и что получаю</h3><p>Психика лучше реагирует именно на вопросы, так как это даёт возможность для контакта, в отличие от приказа и силы воли. Главный вопрос: получаю ли я это на самом деле?</p><ul><li>Согласилась → надеюсь на любовь → получаю раздражение;</li><li>Промолчала → надеюсь на мир → получаю обиду;</li><li>Спасла → надеюсь на благодарность → получаю новые требования;</li><li>Отказалась от своих планов → надеюсь на близость → получаю усталость.</li></ul><h3>Как начать соблюдать границы</h3><ul><li>Репетиция: заранее проговорить фразу;</li><li>Пауза: не отвечать сразу, взять время;</li><li>Пост-выговаривание;</li><li>Маленькие «нет»: тренироваться в безопасных ситуациях;</li><li>Телесный якорь: почувствовать ноги, сделать вдох перед ответом;</li><li>Правило одного предложения: отказаться без длинных объяснений;</li><li>План Б: заранее знать, что я сделаю, если границу не уважают;</li><li>Дневник границ: каждый вечер записывать один случай, где удалось или не удалось сохранить себя («Где сегодня я сдалась?»).</li></ul><h3>Принципы границ</h3><ul><li>Не обязаны быть логичными. Граница рождается из чувств. Если вам неприятно — это уже граница.</li><li>Не зависят от статуса. Мама, начальник или прохожий — вы вправе задать тон общения с собой.</li><li>Настоящие — гибкие. Где безопасно — расширяются, где больно — сужаются.</li></ul><p>Выставлять границы — это не жестокость. Это честность.</p><h3>Важно не путать · отстаивание и соблюдение</h3><p>Защищать границу не значит бороться за неё.</p><p>Крики, ор — что чаще проживание и разыгрывание травматической привязанности. Соблюдение обычно выражается в действии или не действии.</p><p>Не это:</p><ul><li>объяснять;</li><li>убеждать;</li><li>доказывать;</li><li>воспитывать другого.</li></ul><p>А это:</p><ul><li>уйти / выйти из ситуации;</li><li>отказаться;</li><li>закончить разговор;</li><li>не оправдываться;</li><li>не делать.</li></ul><p>Граница — это не то, что я заставляю делать другого. Граница — это то, что делаю я, если её нарушают.</p><h3>Важно помнить</h3><ul><li>Это некрасивый процесс. Нормально учиться защищать свои границы в 3 года. Если в этом возрасте вам не дали право на злость, протест, отказ, то часть психики застряла на этом уровне. Трёхлетка защищает границы криком, плачем, валянием на полу. Когда вы начинаете в 30, 40, 50, эта часть всплывает — как опоздавшая. Это не регресс, а восстановление прерванного процесса развития.</li><li>У вас нет опыта — и это не ваша вина.</li><li>Это постепенный навык: сначала осознаю, что граница есть, потом замечаю нарушение, потом реагирую с запозданием, потом ближе ко времени события — и только потом в моменте.</li><li>Самое сложное не отстаивать границы, а выдержать чувства после (вина, стыд) — об этом в следующем занятии.</li></ul><h3>Вместо эпилога</h3><p>Один из самых трудных внутренних конфликтов — это столкновение стремления к устойчивой идентичности со стремлением к любви.</p><p>Идентичность требует контура. Любовь его размывает. Именно в любви проявляется хрупкость того, что человек считает «собой».</p><p>Если идентичность ещё не интегрирована, любовь переживается как угроза: слишком много слияния — и теряется ощущение собственного «я»; слишком много дистанции — и невозможно чувствовать привязанность.</p><p>Нередко идентичность начинает строиться через любовь — на месте автономии возникает зависимость: «я есть, потому что меня любят», или наоборот: «я сохраняюсь только если отстраняюсь».</p><p>Чем менее устойчиво внутреннее «я», тем труднее выдерживать амбивалентность близости: быть одновременно в контакте и в своей границе.</p><p>Конфликт не решается простым выбором. Он требует интеграции: способности оставаться собой при наличии другого. Или, точнее, способности переживать контакт, не разрушая контур психики.</p><p>Любовь как угроза идентичности — один из признаков незавершённой сепарации. Но и идентичность без способности к любви — это изолированная структура, не способная к гибкости и эмоциональному отклику.</p><div class=\"quote\">Созависимость заканчивается тогда, когда появляешься ты — отдельный, реальный, устойчивый человек.<span>Граница — это не броня, а форма.</span></div>",exercises:[{"id": "gr_sync", "section": "exercise", "type": "text", "prompt": "Синхронизация", "note": "Что для вас границы? Как вы понимаете и с чем ассоциируете это понятие?", "ph": "Границы для меня — это…"}, {"id": "gr_sverka", "section": "exercise", "type": "text", "prompt": "Сверка", "note": "Какие границы вам сложнее всего выдерживать? Что вы чаще всего сдаёте? Ментальные · эмоциональные · физические · финансовые.", "ph": ""}, {"id": "gr_narush", "section": "exercise", "type": "checklist", "prompt": "Где нарушаются границы", "note": "Отметьте то, что узнаёте.", "groups": [{"title": "Я нарушаю свои границы, когда", "items": ["соглашаюсь, хотя не хочу", "спасаю без просьбы", "угадываю желания", "контролирую", "жертвую собой", "терплю", "объясняю себя вместо простого «нет»"]}, {"title": "Партнёр нарушает мои границы, когда", "items": ["игнорирует мои «нет»", "требует объяснений", "обесценивает чувства", "контролирует", "манипулирует виной", "вторгается в моё пространство", "ожидает, что я буду доступна всегда"]}]}, {"id": "gr_proishodit", "section": "exercise", "type": "text", "prompt": "Что происходит", "note": "Что происходит, когда я нарушаю свои границы?", "ph": ""}, {"id": "gr_boyus", "section": "exercise", "type": "group", "prompt": "Чего я боюсь", "note": "Одиночество · отвержение · конфликт · неопределённость · вину · встречу с собой.", "fields": [{"id": "gr_boyus_1", "label": "Я боюсь…", "ph": ""}, {"id": "gr_boyus_2", "label": "…и потому готова", "ph": "подстраиваться, заслуживать любовь, быть удобной, терпеть, молчать, контролировать…"}]}, {"id": "gr_nadeyus", "section": "exercise", "type": "checklist", "prompt": "Что я надеюсь получить", "note": "Когда я нарушаю свою границу, я надеюсь… Главный вопрос: получаю ли я это на самом деле?", "groups": [{"title": "Я надеюсь…", "items": ["чтобы меня любили", "чтобы меня не бросили", "чтобы мной не разочаровались", "чтобы сохранить отношения", "чтобы избежать конфликта", "чтобы заслужить заботу", "чтобы чувствовать себя нужной", "чтобы быть «хорошей»", "чтобы не испытывать вину"]}]}, {"id": "gr_cena", "section": "exercise", "type": "group", "prompt": "Цена нарушения границы", "note": "Возьмите ситуацию и ответьте на два вопроса.", "fields": [{"id": "gr_cena_1", "label": "Что я выигрываю", "ph": "что я получаю, нарушая свою границу"}, {"id": "gr_cena_2", "label": "Чем я плачу", "ph": "покой, сон, силы, уважение к себе"}]}, {"id": "gr_dnevnik", "section": "exercise", "type": "group", "prompt": "Дневник контроля", "note": "Я нахожу только три вида дел: мои, твои и Бога. Чьим делом ты сейчас занят?", "fields": [{"id": "gr_dn_1", "label": "Я управляю…", "ph": "…тем, что сказала нет"}, {"id": "gr_dn_2", "label": "Я не управляю…", "ph": "…тем, что он обиделся"}, {"id": "gr_dn_3", "label": "Я пытаюсь управлять, хотя не могу…", "ph": "…его настроением — и выматываюсь"}]}, {"id": "gr_pravila", "section": "exercise", "type": "pairs", "prompt": "Привычка → новое правило", "note": "Слева привычка, справа новое правило. Примеры можно заменить своими.", "left": "Моя привычка", "right": "Новое правило", "rows": [{"l": "Сразу соглашаться, не подумав", "r": "Я подумаю и отвечу завтра"}, {"l": "Извиняться за отказ", "r": "Можно отказывать без извинений"}, {"l": "Ждать, что партнёр сам догадается", "r": "Говорю прямо"}, {"l": "", "r": ""}, {"l": "", "r": ""}]}, {"id": "gr_moipravila", "section": "exercise", "type": "group", "prompt": "Мои правила", "note": "С кем и как я соблюдаю границы?", "fields": [{"head": "Близкие"}, {"id": "gr_mp_mama", "label": "Мама", "ph": ""}, {"id": "gr_mp_roditeli", "label": "Родители", "ph": ""}, {"id": "gr_mp_partner", "label": "Партнёр", "ph": ""}, {"head": "Друзья"}, {"id": "gr_mp_podruga", "label": "Лучшая подруга", "ph": ""}, {"id": "gr_mp_druzya", "label": "Друзья", "ph": ""}, {"head": "Работа"}, {"id": "gr_mp_kollegi", "label": "Коллеги", "ph": ""}]}]},
  {n:4,title:"Чувства",q:"Почему чувства ощущаются как опасность?",c:"#7B7772",video:"https://disk.yandex.ru/i/whz690EoDaTccA",videoMeta:"Яндекс Диск",unlock:"2026-07-05T14:00",pass:"2026",content:"<h3>Вопросы к началу встречи</h3><p><b>Как отличить здоровые границы от желания контролировать ситуацию?</b> Где проходит граница между заботой о себе и попыткой снизить тревогу с помощью гарантий от другого человека?</p><p>Граница касается моего поведения, контроль касается поведения другого человека.</p><p>Когда мы говорим о гарантиях, важно не столько содержание самой просьбы, сколько реакция на отказ. Просить о чём-то нормально. В отношениях можно договариваться, озвучивать свои потребности и искать решения, которые подходят обоим.</p><p>Если другому человеку это подходит, это становится вашей общей договорённостью. Но если человек не готов, именно здесь становится видно, с чем мы имеем дело. Если я могу выдержать отказ и дальше решить, подходит ли мне это, — это про границы. Если же я не могу выдержать отказ и начинаю требовать, убеждать, обижаться или воспринимать отказ как угрозу отношениям, — это уже попытка снизить свою тревогу через контроль другого человека.</p><p>И здесь не нужно стремиться всё делать идеально. Это навык, который развивается постепенно. Самый надёжный ориентир — ваши ощущения и чувства. Когда вы начинаете на них опираться, ответы постепенно приходят сами.</p><p><b>Как выстраивать отношения со своими базовыми потребностями?</b> Всегда ли их нужно удовлетворять сразу, и где проходит граница между здоровой гибкостью и привычкой нарушать собственные границы?</p><p>Если у вас есть возможность удовлетворить базовую потребность, лучше сделать это сразу. Именно поэтому она называется базовой. Терпеть имеет смысл только тогда, когда выбора действительно нет.</p><p>Привычка откладывать свои базовые потребности постепенно становится привычкой нарушать собственные границы. Кроме того, она создаёт совершенно ненужное напряжение. Любая привычка перетерпеть — эмоцию, желание или потребность — становится ещё одним источником внутреннего напряжения, которое со временем может проявляться тревогой, симптомами, срывами или зависимым поведением.</p><div class=\"quote\">Ни один взрослый ещё не умер от переживания своих внутренних чувств, независимо от того, насколько сильными они могут казаться. Однако многие взрослые подавляли свои чувства и переживания и умерли от болезней, вызванных этим подавлением.<span>Дж. и Б. Уайнхолд</span></div><h3>Зачем вообще нужны эмоции</h3><p>Не «плохие» и «хорошие», а биологическая система навигации. Эмоция показывает, где я сейчас и куда мне двигаться.</p><p>Чувство — это сигнал, а не угроза. У созависимого оно часто переживается как опасность, которую надо срочно убрать.</p><p>Страх бережёт, предупреждает об опасности; злость защищает границу, отстаивает моё; грусть помогает отгоревать и отпустить; радость показывает, что важно, к чему идти.</p><p>У созависимого эти сигналы перепутаны или заглушены: одни звучат громко, другие почти не слышны.</p><h3>Карта темы · семь нарушений эмоциональной сферы</h3><p>Дело не в самих чувствах, а в отношениях с ними. Чувства:</p><ul><li>воспринимаются как опасные;</li><li>плохо распознаются;</li><li>путаются между собой;</li><li>не выдерживаются;</li><li>не понимается их смысл и функция;</li><li>не переводятся в здоровое действие;</li><li>переносятся с себя на другого человека → Аффект.</li></ul><h3>Чувства воспринимаются как опасные</h3><p>У любого чувства есть приставка «ужас»:</p><ul><li>не тревога, а ужасная тревога;</li><li>не злость, а разрушающая ярость;</li><li>не страх потери, а невыносимый страх потери.</li></ul><p>Как должно быть: взрослый сначала контейнирует чувство ребёнка, психика ещё не справляется сама. Потом помогает назвать его и даёт навигацию.</p><p>Что происходит чаще:</p><ul><li>Игнорируют. Ребёнок остаётся наедине с чувством, и для несформированной психики оно кажется слишком большим.</li><li>Усиливают. В ответ начинают кричать, и уже возникшее чувство раздувается ещё больше.</li><li>Запрещают и стыдят. Ребёнок считывает: это чувство угрожает отношениям.</li></ul><p>Чувствуя, ребёнок снова и снова встречает либо что-то слишком большое, либо угрозу отношениям. Так у каждого чувства появляется приставка «ужас».</p><h3>Чувства путаются</h3><p>Запретное чувство под маской другого.</p><ul><li>Девочки, которым нельзя злиться. Мальчики, которым нельзя плакать.</li><li>Вырастают в семьи, где мужья при любом страхе и фрустрации орут, а жёны в непонятных ситуациях плачут, даже там, где нужно разозлиться.</li><li>Но злость невозможно выплакать, а страх невозможно проорать.</li></ul><h3>Чувства плохо распознаются</h3><p>Внимание всё время на другом, а не на себе.</p><ul><li>В детстве не хватило спокойствия и стабильного взрослого, чтобы перенести внимание на себя. Поэтому ребёнок постоянно считывает состояние другого.</li><li>Человек вырастает суперчувствительным: слышит, как поворачивается ключ в двери, по одному взгляду понимает, что чувствует другой. Но контакта с собой при этом нет.</li></ul><p>Чувствительность к другому и контакт со своими чувствами — это не одно и то же. Это настроенность на Другого, которая когда-то сформировалась как способ сохранить привязанность.</p><p>В созависимости проблема не в самих эмоциях, а в неспособности переработать их, не разрушая себя и других. Чувства накапливаются до срыва: либо самоуничтожение, либо агрессия наружу.</p><h3>Злость · первая проблема, которую нельзя испытывать</h3><p>Как это работает с опорой на себя: злость и страх работают по очереди. Я злюсь, отстаиваю границу, возвращаюсь в близость. Одно чувство завершается, и только потом включается другое. Злость не угрожает связи, потому что связь не единственный источник выживания.</p><p>Как это работает в созависимости: «Я злюсь на тебя. Я боюсь тебя потерять.» Оба импульса включаются одновременно и на одного и того же человека.</p><ul><li>Злость — оттолкнуть, защитить границу, отделиться;</li><li>Страх потери — удержать, приблизиться, не дать исчезнуть.</li></ul><p>Злость требует оттолкнуть. Страх запрещает отталкивать, потому что партнёр переживается как жизненно необходимый. И если злость нельзя испытывать, она переходит в безопасные формы.</p><h3>1 · Стыд</h3><p>Стыд как форма аутоагрессии. Стыд = отвращение к себе + страх быть брошенным. Это патологическая привычка подавлять, которая врастает в нервную систему и гормональный фон.</p><p>Почему родитель злоупотребляет стыдом? Это самый эффективный способ заглушить проявление агрессии: он не требует крика или конфликта, он просто обрывает импульс на корню. Плюс конкуренция с однополым ребёнком от страха и недостатка собственной самореализации.</p><p>Он бывает полезным · здоровый стыд:</p><ul><li>Регулирует социальное поведение: не выходить голым на улицу, не флиртовать с чужим партнёром. Он поддерживает границы, безопасность, социум.</li><li>Связан с личными ценностями. Если моя ценность — верность, то мне стыдно изменять, и это нормально.</li></ul><p>А бывает парализующим · токсичный стыд. Почва для него — когда мне с детства прививают ценности, которые меня парализуют: хотеть — стыдно, секс — стыдно, петь — стыдно, быть в центре внимания — стыдно.</p><p>Стыдом подменяют совесть. Совесть — внутренний ориентир, связанный с моими ценностями. Стыд — парализующее чувство, связанное с внешним осуждением. В каждом конкретном случае мы ищем истоки нашего стыда и определяем, полезен он или нет. Если полезен — принять и жить с ним. Если нет — пересматривать ценности.</p><p>Стыд нельзя переубедить: он возникает раньше логики, живёт не столько в мыслях, сколько в нервной системе. Недостаточно сказать себе «мне нечего стыдиться»: тело всё равно переживает угрозу.</p><p>Что помогает: стыд формируется в отношениях и преодолевается тоже через отношения. Но не любые, а те, где человек получает новый опыт:</p><ul><li>меня увидели и не отвергли;</li><li>я ошибся, но связь сохранилась;</li><li>я рассказал о себе, и меня не унизили;</li><li>мои чувства выдержали.</li></ul><p>Механизм изменения: стыд уменьшается не тогда, когда перестаёт возникать, а тогда, когда человек учится оставаться в контакте с собой, даже испытывая стыд. Каждый раз, выдерживая маленькую порцию стыда и не разрушая себя, психика получает новый опыт: «это чувство тяжёлое, но оно не уничтожает меня».</p><p>Стыд выключает человека: под ним становится трудно просить, отказывать, злиться, проявляться, ошибаться, говорить о своих потребностях.</p><p>Внутренний голос — зритель, который всегда смотрит. Стыд не может существовать в пустоте, ему нужен зритель. Когда рядом нет реального наблюдателя, его место занимает внутренний голос — тот самый родитель, который когда-то стыдил, оценивал, сравнивал. Три лика внутреннего критика: Карающий, Обесценивающий, Обвиняющий.</p><h3>2 · Вина · второй способ безопасной злости</h3><p>Вина может быть прогрессом. Стыд говорит «я плохой», вина говорит «я сделал что-то не так». Вина — это уже шаг к отделению себя от поступка, начало осознания, что я не есть моя ошибка. Путь: стыд, чувство вины, агрессия, настоящие чувства, включая любовь.</p><p>Что происходит в созависимости: вина возникает не после причинённого вреда, а после любого действия, которое не понравилось другому. Критерием становится не собственная совесть, а чужая реакция: отказал, обозначил границу, не спас, не согласился, выбрал себя, не оправдал ожидания.</p><p>Здоровая вина рождается из моих ценностей: я чувствую её, когда нарушаю свой собственный внутренний ориентир, и могу компенсировать, изменить, попросить прощения, восстановить контакт.</p><p>Токсичная вина возникает не изнутри, а снаружи: из неустойчивости к реакции другого, из страха быть отвергнутым, из невозможности выдержать чужую злость, разочарование, молчание. Это вина, в которую мы проваливаемся вместо того, чтобы действовать.</p><p>Часто токсическая вина — следствие нарушенных границ и подменённой агрессии. Когда в детстве нельзя было сказать «нет», психика находила обходной путь: вина вместо границы. Вместо «я не хочу» → «я виноват, что не хочу»; вместо «это моё» → «я виноват, что забрал». И тогда любое «нет» вызывает вину.</p><p>Главная ловушка: ответственность и влияние — это не одно и то же. Мои действия могут повлиять на другого, но это не значит, что я отвечаю за всё, что он чувствует. Сказать неприятную правду — вызвать боль; отказать — вызвать разочарование; уйти из отношений — вызвать горе. Это не всегда означает причинить непоправимый вред.</p><p>Как отличить здоровую от токсической — главный вопрос: какое у меня было намерение? Я хотел причинить вред? Или пытался защитить себя, свои границы, свои силы? Не избавиться от вины, а различать её источник.</p><h3>3 · Обида · высокие невысказанные ожидания</h3><p>Эмпирическая формула эмоций: ЭМОЦИЯ = ФАКТ − ОЖИДАНИЯ. Факт лучше ожиданий — рождается радость. Факт хуже ожиданий — приходит грусть. Значит по своей эмоции можно прочитать, чего я на самом деле ждала.</p><p>Обида возникает, когда я слишком много ожидаю, но и вкладываюсь. Каждый раз, обижаясь, я незаслуженно повышаю значимость другого. Её часто называют подавленной агрессией или «запертой любовью»: за обидой обычно стоит желание что-то получить от другого, но вместо того чтобы прямо сказать, человек молчит, ждёт, надеется и постепенно начинает обижаться.</p><h3>4 · Разочарование · идеализация как детское ожидание</h3><p>Пока человек идеализирован, сохраняется надежда, что именно он однажды закроет все мои дефициты. Когда реальность начинает противоречить фантазии, психика делает вторую попытку защититься — обесценивает. Идеализация удерживает фантазию, обесценивание защищает от боли. Но если не убегать ни в идеализацию, ни в обесценивание, остаётся только одно чувство — разочарование.</p><p>Разочарование — это трезвость. Отказаться от потенциала, от надежды и столкнуться с тем, что есть, называя всё своими именами. Здесь освобождается место для реальных отношений. Признать, что я не могу изменить другого, но и не могу уйти — внутри связана страхом, надеждой, виной, иллюзией «ещё чуть-чуть».</p><ul><li>Сначала я разочаровываюсь в маме и папе.</li><li>Потом я разочаровываю маму и папу.</li><li>И самое трудное — я разочаровываюсь в себе.</li></ul><h3>5 · Бессилие</h3><p>С разочарованием неизбежно приходит бессилие — это часть той самой формы. Увидеть свою зависимость от «другого» — и только отсюда начинается возвращение к себе. Признать, что я не могу изменить другого. Но и не могу уйти — внутри связана страхом, надеждой, виной, иллюзией «ещё чуть-чуть».</p><div class=\"quote\">Все чувства, о которых мы сегодня говорили, — это чувства встречи с реальностью. Они появляются там, где заканчивается всемогущество. Эти чувства разрушают иллюзию всемогущества, контроля и слияния. А значит, становятся ещё одним шагом к выходу.<span>Созависимость держится на фантазии: другого можно изменить, любовь можно заслужить, а боли можно избежать.</span></div>",exercises:[{"id": "ch_feelings", "section": "exercise", "type": "checklist", "prompt": "Чувства созависимости", "note": "Насколько вы в контакте с каждым? Отметьте, какие переживать чаще, а какие труднее всего.", "groups": [{"title": "Чувства", "items": ["Злость", "Раздражение", "Отвращение", "Боль", "Разочарование", "Бессилие", "Обида", "Вина", "Стыд"]}]}, {"id": "ch_styd_where", "section": "exercise", "type": "checklist", "prompt": "Стыд · Где живёт мой стыд?", "note": "Отметьте пункты, которые вызывают у вас стыд. Не анализируйте, просто отмечайте.", "groups": [{"title": "Мне стыдно…", "items": ["просить о помощи", "говорить «нет»", "злиться / плакать / бояться", "проводить время без партнёра", "радоваться без партнёра", "получать больше, чем отдавать", "просить поддержки", "ревновать / контролировать", "быть уязвимой", "быть слишком эмоциональной", "не справляться", "выглядеть глупо", "говорить о своих чувствах", "говорить о своих желаниях", "говорить о деньгах", "просить о близости", "быть слишком громким / тихим", "писать первой", "что не могу уйти / что снова простила", "быть успешнее / хуже партнёра", "быть отвергнутой / покинутой", "получать удовольствие", "отказывать / выбирать себя", "разочаровывать партнёра", "без отношений я чувствую пустоту", "быть неудобным / собой", "что мне так сильно нужна любовь"]}]}, {"id": "ch_styd_who", "section": "exercise", "type": "text", "prompt": "Стыд · Кто решил, что за это стыдно?", "note": "Посмотрите на отмеченные пункты: это противоречит моим ценностям? так было принято в семье? так говорили родители? так реагировали окружающие? или я даже не знаю, откуда это?", "ph": ""}, {"id": "ch_styd_child", "section": "exercise", "type": "text", "prompt": "Стыд · Взгляд на ребёнка", "note": "Если бы маленький ребёнок сделал то, за что вам сейчас стыдно, — вам было бы стыдно за него? Или вы отнеслись бы к нему с пониманием?", "ph": ""}, {"id": "ch_namer", "section": "exercise", "type": "group", "prompt": "Вина · Намерение", "note": "Не избавиться от вины, а различить её источник.", "fields": [{"id": "ch_nm_1", "label": "Что я сделала?", "ph": ""}, {"id": "ch_nm_2", "label": "Моё намерение было причинить вред?", "ph": ""}, {"id": "ch_nm_3", "label": "Есть ли объективный ущерб?", "ph": "если нет — за что я себя наказываю?"}, {"id": "ch_nm_4", "label": "Что я могу исправить?", "ph": ""}, {"id": "ch_nm_5", "label": "Или мне просто трудно выдерживать, что другому неприятно?", "ph": ""}]}, {"id": "ch_razoch", "section": "exercise", "type": "checklist", "prompt": "Разочарование · Я разочарована…", "note": "Выберите свои варианты.", "groups": [{"title": "Я разочарована…", "items": ["…что человек оказался не таким, как я надеялась", "…что отношения оказались не такими, как я мечтала", "…что меня не выбрали", "…что меня не полюбили так, как мне хотелось", "…что мои чувства не были взаимными", "…что человек не изменился", "…что мои старания ничего не изменили", "…что меня не поняли", "…что мои потребности не были услышаны", "…что я не получила той любви, в которой нуждалась", "…что мои ожидания не оправдались", "…что я не смогла спасти отношения", "…что я не смогла изменить другого человека", "…что я не смогла заслужить любовь", "…что человек выбрал не меня", "…что меня невозможно любить так, как мне хочется", "…что любовь не исцеляет детские травмы", "…что другой человек не может закрыть все мои дефициты", "…что невозможно заслужить любовь идеальным поведением", "…что невозможно изменить другого своей заботой", "…что невозможно контролировать чувства другого человека", "…что отношения не могут быть идеальными", "…что не существует идеального партнёра", "…что не существует идеальных отношений", "…что не существует способа никогда больше не испытывать боль", "…что жизнь оказалась не такой, как я представляла", "…что прошлое невозможно изменить", "…что не всё зависит от меня", "…что некоторые вещи мне неподвластны"]}]}, {"id": "ch_prozhit", "section": "exercise", "type": "group", "prompt": "Прожить разочарование", "note": "Важно дождаться телесного отклика: смысл в проживании, а не в исправлении.", "fields": [{"id": "ch_prozhit_1", "label": "Вдох", "ph": "Я сильно разочарована"}, {"id": "ch_prozhit_2", "label": "Выдох", "ph": "Всё получилось не так, как я хотела"}, {"id": "ch_prozhit_3", "label": "Завершить", "ph": "Да, признаю своё разочарование"}]}, {"id": "ch_bessilie", "section": "exercise", "type": "checklist", "prompt": "Бессилие · Где я бессильна?", "note": "Отметьте, перед чем вы сейчас чувствуете бессилие. «Я не могу…»", "groups": [{"title": "Я не могу…", "items": ["изменить другого человека", "сделать так, чтобы меня любили", "сделать так, чтобы меня понимали", "сделать так, чтобы человек захотел меняться", "контролировать чужие чувства", "контролировать чужой выбор", "изменить прошлое", "исправить все свои ошибки", "никогда больше не испытывать боль", "сделать так, чтобы никто не разочаровывался во мне", "сделать так, чтобы отношения не заканчивались", "сделать так, чтобы тревога больше никогда не возвращалась"]}]}, {"id": "ch_bess3", "section": "exercise", "type": "group", "prompt": "Бессилие · Три вопроса", "note": "Выберите один пункт бессилия и ответьте.", "fields": [{"id": "ch_b3_1", "label": "Что я чувствую в теле, когда признаю бессилие?", "ph": ""}, {"id": "ch_b3_2", "label": "Что мне больше всего хочется сделать?", "ph": "убедить, доказать, написать, спасти, убежать, замереть…"}, {"id": "ch_b3_3", "label": "На что я всё-таки могу повлиять?", "ph": ""}]}, {"id": "ch_power", "section": "exercise", "type": "text", "prompt": "Что сегодня в моей власти?", "note": "Например: сказать «нет»; не писать первой; прожить свою грусть; попросить о помощи; лечь спать вовремя.", "ph": ""}, {"id": "ch_refl", "section": "exercise", "type": "group", "prompt": "Рефлексия · С чем я ухожу?", "fields": [{"id": "ch_r_1", "label": "Главный инсайт", "ph": ""}, {"id": "ch_r_2", "label": "Что понравилось", "ph": ""}, {"id": "ch_r_3", "label": "Что было дискомфортно", "ph": ""}]}]},
  {n:5,title:"Дефициты",q:"Что я пытаюсь получить через другого?",c:"#5E8FB5",video:"https://disk.yandex.ru/i/BnjnyuA2UTo19w",videoMeta:"Яндекс Диск",unlock:"2026-07-12T14:00",pass:"2026",content:`<h3>Потребности · дефициты · ценности</h3><p>Потребности — это то, без чего человек не может жить. Это ощущение безопасности, покоя, любви, принадлежности. Все базовые потребности у людей одинаковы — в еде, тепле, поддержке, свободе, принятии, уважении.</p><p>Дефициты — это неудовлетворённые потребности. Те, которые долго игнорировались или подавлялись. Психика ищет им компенсацию — чаще всего через других людей, контроль, зависимость или сверхуспех.</p><p>Ценности — это то, ради чего мы живём. Они проявляются тогда, когда базовые потребности уже в относительной норме, и человек может выбирать не из страха, а из смысла.</p><div class="quote">Он не выбирает — он компенсирует.<span>А для ценностей всегда нужны условия выбора, и главное из них — сытость на уровне потребностей и, тем более, дефицитов.</span></div><h3>Когда за ценностью прячется дефицит</h3><ul><li>Уважение. Ценность: честность и прямота. Дефицит: принятия (страх отвержения). Хочу быть честной, но боюсь: скажу правду — потеряю контакт.</li><li>Самореализация. Ценность: развитие, творчество, предназначение. Дефицит: чувство никчёмности, страх неудачи. Мечтаю о своём деле, но не начинаю: боюсь подтвердить «я не способна».</li><li>Спокойствие. Ценность: осознанность, медленность, тишина. Дефицит: тревога, контакт с собой. Хочу спокойной жизни, но ищу драму: сильные эмоции дают чувство живости.</li><li>Безопасность. Ценность: стройность, здоровье, забота о теле. Дефицит: базовая безопасность и внутренняя опора. Хочу режим и спорт, но тело сопротивляется: еда остаётся стабильным источником спокойствия и контроля.</li><li>Принятие и самоуважение. Ценность: достоинство, уважение к себе. Дефицит: принятия. Знаю, что в отношениях нарушается достоинство, но выйти не могу: крошечное принятие подпитывает дефицит.</li></ul><h3>Пять базовых эмоциональных потребностей</h3><ul><li>Безопасная привязанность: связь, надёжность, безопасность, доверие, принятие.</li><li>Автономия, компетентность, идентичность: «я отдельный, способный, имею право».</li><li>Спонтанность и игра: радость, лёгкость, творчество, импульсивность без страха наказания.</li><li>Реалистичные границы и самоконтроль: структура, ответственность, уважение границ других, внутренняя опора.</li><li>Свобода выражения потребностей и эмоций: право чувствовать, выражать злость, грусть, радость, нуждаться.</li></ul><h3>Дефициты как магниты</h3><p style="font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 12px">что тянет меня в отношения</p><ul><li>Не хватало привязанности → цепляюсь за отношения любой ценой.</li><li>Не хватало автономии → не могу без другого.</li><li>Не хватало права чувствовать → терплю и молчу.</li><li>Не хватало спонтанности → жду, что другой «оживит» мою жизнь.</li><li>Не хватало границ → растворяюсь или контролирую.</li></ul><h3>Цикл созависимости</h3><ul><li>Спасение. Активируется надежда: «вот сейчас меня наконец полюбят, примут, заметят, спасут». Человек инвестирует, угадывает, спасает, даёт, чтобы удержать источник восполнения.</li><li>Отвержение. Другой не может заполнить дефицит. Когда он не оправдывает ожидания: боль, ярость, покинутость, паника. Активация старой раны: «меня опять не выбрали».</li><li>Удерживание. Уговоры, уступки, обесценивание своих чувств, попытки «вернуть, как было». Психика идёт на круг, потому что дефицит не закрыт.</li></ul><h3>Как дефициты влияют · шесть тезисов</h3><ul><li>Дефициты определяют выбор партнёра: психика ищет того, кто одновременно узнаваем и обещает восполнение дефицита.</li><li>Дефициты делают нас зависимыми от чужой реакции: нет безопасности внутри, ищу подтверждение снаружи.</li><li>Дефициты искажают восприятие любви: не качество отношения, а сила надежды.</li><li>Дефициты обостряют страх потери: не конкретный человек, а последний шанс.</li><li>Дефициты удерживают в разрушительных связях: чем сильнее дефицит, тем сложнее отказаться даже от минимального удовлетворения.</li><li>Дефициты мешают выбирать из ценностей: психика занята не выбором лучшей жизни, а поиском восполнения нехватки.</li></ul><div class="quote">В созависимости отношения становятся зеркалом не любви, а наших дефицитов.<span>Работа начинается там, где мы перестаём искать восполнение и начинаем замечать, что именно внутри нас пусто.</span></div><h3>Как найти свой дефицит · самодиагностика</h3><p>После стрелки: базовая потребность, с которой связан дефицит.</p><p>1 · Посмотри, что ты не выдерживаешь</p><ul><li>Если невыносимо ждать → дефицит безопасной привязанности. Тревога включается, как только связь становится менее доступной.</li><li>Если невыносимо быть одной → дефицит автономии, компетентности и чувства идентичности. Кажется, что без другого ты не справишься или потеряешь себя.</li><li>Если невыносимо ошибаться → дефицит безопасной привязанности (условное принятие) и дефицит автономии.</li><li>Если невыносимо слышать критику → дефицит безопасной привязанности. Любая критика переживается как угроза любви и близости.</li></ul><p>2 · Заметь, где ты «слишком»</p><ul><li>Слишком подстраиваешься → дефицит безопасной привязанности. Кажется, что любовь нужно заслужить.</li><li>Слишком боишься быть отвергнутой → дефицит безопасной привязанности.</li><li>Слишком зависишь от чужой оценки → дефицит автономии, компетентности и чувства идентичности.</li><li>Слишком контролируешь → дефицит безопасной привязанности. Контроль снижает тревогу и помогает не потерять отношения.</li><li>Слишком запрещаешь себе отдыхать, хотеть, наслаждаться → дефицит спонтанности и игры.</li></ul><p>3 · Обрати внимание на свои навязчивые желания</p><ul><li>Чтобы меня понимали без слов → дефицит безопасной привязанности (эмоциональная отзывчивость).</li><li>Чтобы меня постоянно успокаивали → дефицит безопасной привязанности.</li><li>Чтобы мной восхищались и гордились → дефицит автономии, компетентности и чувства идентичности.</li><li>Чтобы наконец можно было расслабиться, дурачиться, жить легко → дефицит спонтанности и игры.</li><li>Чтобы кто-то сказал, что теперь можно жить «неправильно» → дефицит реалистичных границ и самоконтроля.</li></ul><p>4 · Чего мне особенно не хватало в детстве?</p><ul><li>Надёжной эмоциональной связи? → дефицит безопасной привязанности.</li><li>Веры, что я справлюсь сама? → дефицит автономии, компетентности и чувства идентичности.</li><li>Права злиться, плакать, говорить «нет»? → дефицит свободы выражения чувств и потребностей.</li><li>Права играть, радоваться и быть ребёнком? → дефицит спонтанности и игры.</li><li>Спокойных, понятных правил и уважения к границам? → дефицит реалистичных границ и самоконтроля.</li></ul><h3>Как восполнить дефицит</h3><p>1 · Назвать прямо. Названный дефицит перестаёт быть бездонной пустотой и становится задачей, с которой можно работать. Пример: «Я боюсь потерять близость.»</p><p>2 · Разделить «потребность» и «дефицит». Потребность говорит: «мне это важно». Дефицит кричит: «мне это нужно любой ценой».</p><p>3 · Что я могу дать себе сама? Что я могу постепенно научиться давать себе сама? Что мне действительно необходимо получать в отношениях?</p><p>4 · Перевести «мне не хватает» в «мне нужно». «Мне не хватает безопасности» → «Мне нужно больше структурировать свой день и поддерживать стабильность».</p><p>5 · Маленькие шаги. Психика не верит словам, она верит опыту. Выбирайте простые конкретные действия, а не глобальные «исцеления».</p><p>6 · Долгосрочная работа. Постепенно учить внутреннего родителя восполнять этот дефицит (упражнение с фотографией, работа со списком «мне нужно»). Отслеживать, где я пытаюсь закрыть дефицит через другого, и мягко возвращать это внимание себе.</p><h3>Восполнение во взрослой жизни</h3><p>Дефицит безопасной привязанности: «Мне не хватает ощущения, что рядом есть кто-то надёжный.»</p><ul><li>выбирать людей, рядом с которыми безопасно, а не эмоционально ярко;</li><li>учиться просить поддержку прямо;</li><li>постепенно становиться человеком, который успокаивает себя сам;</li><li>регулярно создавать опыт стабильных отношений, а не только романтических.</li></ul><p>Главный навык: учиться выдерживать тревогу, не разрушая отношения и не цепляясь за них.</p><p>Дефицит автономии, компетентности и чувства идентичности: «Я не уверен, что справлюсь сам.»</p><ul><li>принимать самостоятельные решения;</li><li>брать небольшую ответственность за свою жизнь;</li><li>осваивать новые навыки;</li><li>регулярно спрашивать себя: «А чего хочу именно я?»</li></ul><p>Главный навык: опираться на себя, а не только на другого человека.</p><p>Дефицит свободы выражать чувства и потребности: «Мне нельзя хотеть, чувствовать и говорить о себе.»</p><ul><li>замечать свои чувства;</li><li>учиться говорить о потребностях без чувства вины;</li><li>тренировать слово «нет»;</li><li>разрешать себе быть неудобным.</li></ul><p>Главный навык: не подавлять себя ради сохранения отношений.</p><p>Дефицит спонтанности и игры: «Жизнь всё время про долг, а не про удовольствие.»</p><ul><li>каждый день делать что-то приятное без пользы;</li><li>возвращать телесное удовольствие;</li><li>играть, смеяться, творить;</li><li>перестать откладывать жизнь «на потом».</li></ul><p>Главный навык: получать удовольствие не только через отношения.</p><p>Дефицит реалистичных границ и самоконтроля: «Либо всё запрещено, либо всё выходит из-под контроля.»</p><ul><li>строить понятный режим;</li><li>постепенно формировать привычки;</li><li>учиться выдерживать дискомфорт без крайностей;</li><li>относиться к себе с требовательностью, но без жестокости.</li></ul><p>Главный навык: быть себе взрослым, который одновременно поддерживает и ограничивает.</p><h3>Итог занятия</h3><p>Дефициты → закрываются постепенно.</p><p>С дефицитом ничего «не сделать раз и навсегда». Его можно узнавать, переводить в язык потребности и учиться восполнять постепенно: через себя, через здоровые контакты, через устойчивые действия.</p><div class="quote">Во взрослом возрасте задача не найти человека, который восполнит все ваши дефициты. Задача постепенно научиться восполнять их из разных источников.<span>Тогда отношения перестают быть единственным местом, от которого зависит ваше выживание.</span></div>`,exercises:[{"id": "df_cennosti", "section": "exercise", "type": "text", "prompt": "Понятия · Ценности и дефицит", "note": "Где я оцениваю себя или партнёра «в рамках ценностей», хотя дефицит ещё не закрыт?", "ph": ""}, {"id": "df_za_cennostyu", "section": "exercise", "type": "checklist", "prompt": "Когда за ценностью прячется дефицит", "note": "Отметьте то, что узнаёте про себя.", "groups": [{"title": "Узнаю про себя", "items": ["Уважение. Хочу быть честной, но боюсь: скажу правду — потеряю контакт.", "Самореализация. Мечтаю о своём деле, но не начинаю: боюсь подтвердить «я не способна».", "Спокойствие. Хочу спокойной жизни, но ищу драму: сильные эмоции дают чувство живости.", "Безопасность. Хочу режим и спорт, но тело сопротивляется: еда остаётся стабильным источником спокойствия и контроля.", "Принятие и самоуважение. Знаю, что в отношениях нарушается достоинство, но выйти не могу: крошечное принятие подпитывает дефицит."]}]}, {"id": "df_moy_primer", "section": "exercise", "type": "group", "prompt": "Ваш пример", "fields": [{"id": "df_mp_1", "label": "Ценность", "ph": ""}, {"id": "df_mp_2", "label": "Дефицит", "ph": ""}, {"id": "df_mp_3", "label": "Как это проявляется рядом с Другим", "ph": ""}]}, {"id": "df_pyat", "section": "exercise", "type": "checklist", "prompt": "Пять базовых эмоциональных потребностей", "note": "Отметьте те, где узнаёте свой дефицит.", "groups": [{"title": "Мой дефицит", "items": ["Безопасная привязанность: связь, надёжность, безопасность, доверие, принятие.", "Автономия, компетентность, идентичность: «я отдельный, способный, имею право».", "Спонтанность и игра: радость, лёгкость, творчество, импульсивность без страха наказания.", "Реалист el": "Главный инсайт", "ph": "что сегодня откликнулось сильнее всего?"}, {"id": "df_dz_2", "label": "Что возьму с собой", "ph": "мысль, чувство, осознание или практика, которую хочется сохранить"}, {"id": "df_dz_3", "label": "Что понравилось, а что вызвало дискомфорт", "ph": ""}]}]},
  {n:6,title:"Привязанность",q:"Почему я держусь за того, с кем мне плохо?",c:"#C99A5B",video:"",videoMeta:"",unlock:"2026-07-19T14:00",pass:"2026",content:`<h3>О чём этот урок</h3><ul><li>Что такое привязанность и как она складывается.</li><li>Одна ситуация: четыре разных пути.</li><li>Стратегии близости и как они включаются.</li><li>Почему тревожного тянет к избегающему.</li><li>Связь с созависимостью: терпеть, требовать, скорость сближения.</li><li>Что делать: возвращаться к себе и растить устойчивость.</li></ul><h3>Что такое привязанность</h3><p>Привязанность: это система выживания. Она отвечает на вопрос: «Что мне делать, чтобы рядом со мной оставались важные люди?»</p><p>Ребёнок не выбирает свой стиль привязанности, он приспосабливается к тому, как откликается дом. Так складывается внутренняя рабочая модель:</p><p>потребность → контакт с родителем → повторяющийся опыт → убеждение о себе → способ строить отношения</p><div class="quote">Во взрослых отношениях привязанность никуда не девается, просто меняет адресата.</div><h3>Одна ситуация: четыре пути</h3><p>Ребёнок прибегает к маме: «Мне страшно». Мама раздражённо отвечает: «Перестань ныть». И так много лет. Из одной и той же ситуации вырастает разное, в зависимости от темперамента, восприятия и выбранной стратегии.</p><ul><li>Капитуляция → тревожная. «Если я буду удобным, меня будут любить». Подстраивается, терпит; легко попадает в созависимость.</li><li>Избегание → избегающая. «Больше ни от кого не буду зависеть». Закрывается, избегает близости.</li><li>Гиперкомпенсация → тревожная. «Стану сильным, и мне не сделают больно». Контроль, достижения; в близости всё равно сдаёт.</li><li>Более устойчивая нервная система. Опыт безопасности от другого взрослого или устойчивый темперамент смягчают последствия.</li></ul><h3>Стратегии близости</h3><p>Тип: это не диагноз, а стратегия выживания. Четыре голоса внутри:</p><ul><li>Надёжная: «Я могу быть собой».</li><li>Тревожная: «Мне нужно удержать человека».</li><li>Избегающая: «Мне безопаснее ни в ком не нуждаться».</li><li>Дезорганизованная: «Я одновременно бегу к человеку и убегаю от него».</li></ul><p>Когда растёт дистанция, стратегия включается сама: тревожная усиливает сигнал, избегающая заглушает его, дезорганизованная делает оба движения сразу.</p><h3>Почему тревожного тянет к избегающему</h3><p style="font-family:var(--serif);font-style:italic;color:var(--text-soft);margin:0 0 12px">ключ и замок</p><p>Тревожный боится покинутости и тянется, избегающий боится поглощения и отстраняется, каждый подтверждает картину мира другого. Избегающий одновременно активирует травму и обещает исцеление.</p><p>Что держит связку: узнаваемость (знакомое читается как «любовь»), привязанность оживает на нехватке, качели сильнее ровного тепла, дистанция как защита.</p><p>дистанция → тревога → поиск контакта → краткое облегчение → ещё большая привязанность</p><p>Так человек начинает путать тревогу с любовью, тягу с близостью, облегчение с безопасностью, борьбу за отношения с их ценностью.</p><div class="quote">Тянет не к человеку, а к знакомому способу переживать любовь.</div><h3>Связь с созависимостью и стратегии поведения</h3><p>Созависимость говорит на языке тревожной привязанности. Вот как тревожный обходится с потребностью:</p><ul><li>Скорость сближения. Не выдерживает контакт, форсирует «мы», не выносит отдельность другого. Близость идёт рывками: то слияние, то паника.</li><li>Две крайности. Мазохистически терпит («буду удобной, лишь бы не потерять») и садистически требует («заставлю дать мне то, что нужно»). Оба держатся не на силе, а на страхе. Взрослый способ: попросить прямо.</li><li>Просьба или манипуляция. Различить помогают четыре оси: прямота, отказ, субъективность, от первого лица.</li><li>Особые отношения. Ровное, обычное отношение выдержать трудно, поэтому человек претендует на особые: обычных ему не хватает.</li></ul><div class="quote">Суть: тревожный удерживает не партнёра, а ощущение безопасности, которое полностью связал с ним.</div><h3>Стратегия: не приговор</h3><p>Стратегия переучивается опытом, а не силой воли. И вот с чего мы начинаем:</p><p>Главная задача тревожной привязанности: научиться оставаться в себе. Это и есть устойчивость.</p><p>Но в устойчивость нельзя прыгнуть сразу. Порядок такой:</p><ul><li>Сначала: возвращаться к себе. В моменте, когда накрыло. Это ближайшие два урока.</li><li>Потом: оставаться в себе. Способность быть в себе даже в контакте. Это устойчивость.</li></ul><h3>Что забираем с собой</h3><ul><li>Привязанность: система выживания. Во взрослых отношениях она никуда не девается, просто меняет адресата.</li><li>Созависимость: тревожная стратегия, доведённая до предела, а не «плохой характер» и не «слишком сильная любовь».</li><li>Стратегия переучивается опытом, а не силой воли. Опыт можно организовать себе самой, с этого и начнём.</li></ul><div class="quote">Тянет не к человеку, а к знакомому способу переживать любовь.<span>Стратегия переучивается опытом, а не силой воли.</span></div>`,exercises:[{"id": "pr_karta", "section": "exercise", "type": "group", "prompt": "Карта отношений: что повторяется", "note": "Вспомните значимых людей и рядом с каждым коротко ответьте на три вопроса: рядом с ним я чувствовал… / чтобы сохранить отношения, мне приходилось… / чему меня научили эти отношения…", "fields": [{"id": "pr_k_mama", "label": "Мама", "ph": ""}, {"id": "pr_k_papa", "label": "Папа", "ph": ""}, {"id": "pr_k_love", "label": "Первая любовь", "ph": ""}, {"id": "pr_k_pain", "label": "Болезненные отношения", "ph": ""}, {"id": "pr_k_last", "label": "Последний партнёр", "ph": ""}]}, {"id": "pr_strat", "section": "exercise", "type": "group", "prompt": "Моя стратегия близости", "note": "Закончите фразы, вспоминая последние отношения. Не ищите диагноз, ищите повторяющийся способ защищаться.", "fields": [{"id": "pr_s_1", "label": "Когда человек становится мне важен…", "ph": ""}, {"id": "pr_s_2", "label": "Когда он не отвечает…", "ph": ""}, {"id": "pr_s_3", "label": "Когда он
