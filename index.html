function needsPass(l){return false;}
function passView(l){return`<div class="locked"><div class="lock-ic">${I.lock}</div><p class="lock-title">Введите пароль</p><p class="lock-note" style="margin-bottom:18px">Содержание открыто — введите пароль, чтобы посмотреть.</p><div class="passbox"><input type="text" id="passinp" class="passinp" placeholder="Пароль" autocomplete="off" onkeydown="if(event.key==='Enter')tryPass(${l.n})"><button class="passbtn" onclick="tryPass(${l.n})">Открыть</button></div></div>`;}
function tryPass(n){const l=LESSONS.find(x=>x.n===n);const el=document.getElementById("passinp");const v=(el?el.value:"").trim();if(v.toLowerCase()===String(l.pass).toLowerCase()){store.set("ok"+n,"1");render();toast("Открыто");}else{toast("Неверный пароль");}}
function render(){renderTabbar();if(state.lesson){renderLesson();return;}
  if(state.tab==="lessons")renderHome();if(state.tab==="exercises")renderHub();if(state.tab==="org")renderOrg();}

function renderHome(){
  brandAccent();topbar.className="topbar hidden";
  const rows=LESSONS.map(l=>`
    <button class="lrow" onclick="openLesson(${l.n})">
      <span class="rn">${l.n}</span>
      <span class="lb"><span class="lt" style="color:${l.c}">${l.title}</span>${l.q?`<span class="lm">${l.q}</span>`:""}</span>${isLocked(l)?`<span class="rlock">${I.locksm}</span>`:""}
    </button>`).join("");
  view.innerHTML=`
    <div class="pcover">
      <div class="handle">by @radio_tishe</div>
      <div class="ctitle">Уроки<em>созависимости</em></div>
      <div class="name">ОЛЬГА СЕРГЕЕВА</div>
    </div>
    <div class="pad"><div class="section-label">10 встреч</div><div class="lrows">${rows}</div></div>`;
}

const PLAY_IC=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none"/></svg>`;
function videoBlock(l){if(!l.video)return"";return`<div class="vid-wrap"><a class="vid" href="${l.video}" target="_blank" rel="noopener"><span class="vic">${PLAY_IC}</span><span class="vb"><span class="vt">Запись встречи</span><span class="vm">${l.videoMeta||"открыть видео"}</span></span></a></div>`;}
function renderLesson(){
  const l=LESSONS.find(x=>x.n===state.lesson);setAccent(l.c);
  topbar.className="topbar";
  topbar.innerHTML=`<button class="back" onclick="go('lessons')" aria-label="Назад">${I.back}</button>
    <div><p class="eyebrow">Урок ${l.n}</p><h1 class="serif">${l.title}</h1></div>`;
  const tabs=`<div class="tabs">
    <button class="tab ${state.lessonTab==='content'?'active':''}" onclick="state.lessonTab='content';render()">Содержание</button>
    <button class="tab ${state.lessonTab==='ex'?'active':''}" onclick="state.lessonTab='ex';render()">Упражнения</button></div>`;
  let body;if(state.lessonTab==="content"){body=isLocked(l)?lockedView(l):(needsPass(l)?passView(l):(l.content||emptyContent(l)));}else{body=l.exercises.length?exRender(l.exercises):emptyEx();}
  view.innerHTML=`
    <div class="l-head">
      <div class="l-eyebrow">Встреча ${l.n} из 10</div>
      <h2>${l.title}</h2>
      ${l.q?`<div class="l-q">${l.q}</div>`:""}
    </div>${videoBlock(l)}${tabs}<div class="content">${body}</div>`;
  bindEx();
}

function emptyContent(l){if(l.n===1){return`<p class="ex-note">${l.contentMeta||""}</p>
  <div class="placeholder"><span class="ph-tag">Содержание · черновик</span>Здесь будет текст первого урока. Пришлите его — добавлю дословно.</div>`;}
  return`<div class="empty"><div class="ring">${I.edit}</div><p>Содержание появится позже</p></div>`;}
function emptyEx(){return`<div class="empty"><div class="ring">${I.ex}</div><p>Упражнения появятся позже</p></div>`;}

function exText(e,i){const s=store.get(e.id)||"";return`<div class="ex"><div class="ex-head"><span class="ex-idx">${i+1}</span><span class="ex-prompt">${e.prompt}</span></div>
  ${e.note?`<p class="ex-note">${e.note}</p>`:""}<textarea class="ex-input" data-id="${e.id}" placeholder="${e.ph||"Пишите здесь…"}">${esc(s)}</textarea>
  <div class="ex-foot ${s?'saved':''}">${s?I.check+" сохранено":"сохраняется автоматически"}</div></div>`;}
function exScale(e,i){const s=store.get(e.id)||"";const c=parseInt(s||"0",10);const b=[1,2,3,4,5].map(v=>`<button data-scale="${e.id}" data-v="${v}" class="${v===c?'on':''}">${v}</button>`).join("");
  return`<div class="ex"><div class="ex-head"><span class="ex-idx">${i+1}</span><span class="ex-prompt">${e.prompt}</span></div>
  ${e.note?`<p class="ex-note">${e.note}</p>`:""}<div class="scale">${b}</div>
  <div class="ex-foot ${c?'saved':''}">${c?I.check+" сохранено":"выберите значение"}</div></div>`;}
function exGroup(e,i){const fields=e.fields.map(f=>{if(f.head)return`<div class="fld-head">${f.head}</div>`;if(f.step){return`<div class="fld-step"><span class="fld-step-n">${f.step}</span><span class="fld-step-t">${f.text}</span></div>`;}const s=store.get(f.id)||"";return`<div class="fld"><div class="fld-label">${f.label}</div>${f.ph?`<div class="fld-note">${f.ph}</div>`:""}<textarea class="ex-input" data-id="${f.id}" placeholder="…">${esc(s)}</textarea></div>`;}).join("");
  const any=exDone(e);
  return`<div class="ex"><div class="ex-head"><span class="ex-idx">${i+1}</span><span class="ex-prompt">${e.prompt}</span></div>
  ${e.note?`<p class="ex-note">${e.note}</p>`:""}${fields}
  <div class="ex-foot ${any?'saved':''}">${any?I.check+" сохранено":"сохраняется автоматически"}</div></div>`;}
function exChecklist(e,i){const groups=e.groups.map((g,gi)=>`<div class="ckgroup"><div class="ckg-title">${g.title}</div>${g.items.map((it,ii)=>{const id=e.id+":"+gi+":"+ii;const on=store.get(id)==="1";return`<label class="ckitem"><input type="checkbox" class="chk" data-id="${id}" ${on?"checked":""}><span class="ckbox">${I.check}</span><span class="cktext">${it}</span></label>`;}).join("")}${(()=>{const oid=e.id+":own:"+gi;const ov=store.get(oid)||"";return `<div class="ckown"><div class="ckown-l">${e.ownLabel||"Заметки"}</div><textarea class="ckowni" data-id="${oid}" placeholder="…">${esc(ov)}</textarea></div>`;})()}</div>`).join("");
  const any=exDone(e);
  return`<div class="ex"><div class="ex-head"><span class="ex-idx">${i+1}</span><span class="ex-prompt">${e.prompt}</span></div>
  ${e.note?`<p class="ex-note">${e.note}</p>`:""}${groups}
  <div class="ex-foot ${any?'saved':''}">${any?I.check+" отмечено":"отметьте подходящее"}</div></div>`;}
function exDone(e){if(e.type==="pairs"){return e.rows.some((r,k)=>{const a=store.get(e.id+":"+k+":l"),b=store.get(e.id+":"+k+":r");return (a&&a.trim()!=="")||(b&&b.trim()!=="");});}if(e.type==="split"){return e.down.concat(e.up).some(L=>{for(let k=0;k<L.n;k++){const v=store.get(e.id+":"+L.key+":"+k);if(v&&v.trim()!=="")return true;}return false;});}if(e.type==="checklist"){return e.groups.some((g,gi)=>{const o=store.get(e.id+":own:"+gi);if(o&&o.trim()!=="")return true;return g.items.some((it,ii)=>store.get(e.id+":"+gi+":"+ii)==="1");});}
  if(e.type==="group"){return e.fields.some(f=>{const v=store.get(f.id);return v&&v.trim()!==""});}
  const v=store.get(e.id);return v&&v.trim()!=="";}
function exSplit(e,i){const cells=(L)=>`<div class="split-row"><div class="lvl">${L.label}</div>`+Array.from({length:L.n},(_,k)=>{const id=e.id+":"+L.key+":"+k;const s=store.get(id)||"";return `<input type="text" class="splitcell" data-id="${id}" value="${escAttr(s)}" placeholder="…">`;}).join("")+`</div>`;
  const down=e.down.map(cells).join(""),up=e.up.map(cells).join(""),any=exDone(e);
  return`<div class="ex"><div class="ex-head"><span class="ex-idx">${i+1}</span><span class="ex-prompt">${e.prompt}</span></div>
  ${e.note?`<p class="ex-note">${e.note}</p>`:""}
  <div class="split"><div class="split-top"><span class="split-seed">${e.seed}</span></div>
  <div class="split-sec">Расщепление ↓</div>${down}<div class="split-sec">Сборка ↑</div>${up}</div>
  <div class="ex-foot ${any?'saved':''}">${any?I.check+" сохранено":"сохраняется автоматически"}</div></div>`;}
function exPairs(e,i){const head=`<div class="pair-row pair-head"><div class="pair-col">${e.left}</div><div class="pair-col">${e.right}</div></div>`;const rows=e.rows.map((r,k)=>{const idl=e.id+":"+k+":l",idr=e.id+":"+k+":r";const sl=store.get(idl)||"",sr=store.get(idr)||"";return `<div class="pair-row"><textarea class="paircell" data-id="${idl}" placeholder="${escAttr(r.l||"…")}">${esc(sl)}</textarea><textarea class="paircell" data-id="${idr}" placeholder="${escAttr(r.r||"…")}">${esc(sr)}</textarea></div>`;}).join("");const any=exDone(e);return `<div class="ex"><div class="ex-head"><span class="ex-idx">${i+1}</span><span class="ex-prompt">${e.prompt}</span></div>
  ${e.note?`<p class="ex-note">${e.note}</p>`:""}
  <div class="pairs">${head}${rows}</div>
  <div class="ex-foot ${any?"saved":""}">${any?I.check+" сохранено":"сохраняется автоматически"}</div></div>`;}
function exSection(e){return `<div class="ex-section"><div class="ex-section-t">${e.title}</div>${e.sub?`<p class="ex-section-s">${e.sub}</p>`:""}</div>`;}
function exRender(items){return items.map((e,i)=>{if(e.type==="section")return exSection(e);if(e.type==="group")return exGroup(e,i);if(e.type==="checklist")return exChecklist(e,i);if(e.type==="pairs")return exPairs(e,i);if(e.type==="split")return exSplit(e,i);if(e.type==="scale")return exScale(e,i);return exText(e,i);}).join("");}

function autoGrow(t){t.style.height="auto";t.style.height=(t.scrollHeight+2)+"px";}
function bindGrow(){view.querySelectorAll(".ex textarea").forEach(t=>{autoGrow(t);t.addEventListener("input",()=>autoGrow(t));});}
function bindEx(){view.querySelectorAll("textarea.ckowni").forEach(t=>{let tm=null;t.addEventListener("input",()=>{store.set(t.dataset.id,t.value);const f=t.closest(".ex").querySelector(".ex-foot");clearTimeout(tm);tm=setTimeout(()=>{if(f){f.classList.add("saved");f.innerHTML=I.check+" отмечено";}},500);});});view.querySelectorAll("textarea.paircell").forEach(t=>{let tm=null;t.addEventListener("input",()=>{store.set(t.dataset.id,t.value);const f=t.closest(".ex").querySelector(".ex-foot");clearTimeout(tm);tm=setTimeout(()=>{if(f){f.classList.add("saved");f.innerHTML=I.check+" сохранено";}},500);});});view.querySelectorAll("textarea.ex-input").forEach(t=>{let tm=null;t.addEventListener("input",()=>{store.set(t.dataset.id,t.value);
  const f=t.closest(".ex").querySelector(".ex-foot");clearTimeout(tm);tm=setTimeout(()=>{if(f){f.classList.add("saved");f.innerHTML=I.check+" сохранено";}},500);});});
  view.querySelectorAll("button[data-scale]").forEach(b=>{b.addEventListener("click",()=>{const id=b.dataset.scale,v=b.dataset.v;store.set(id,v);
  view.querySelectorAll('button[data-scale="'+id+'"]').forEach(x=>x.classList.toggle("on",x.dataset.v===v));
  const f=b.closest(".ex").querySelector(".ex-foot");if(f){f.classList.add("saved");f.innerHTML=I.check+" сохранено";}toast("Ответ сохранён");});});
  view.querySelectorAll("input.chk").forEach(ch=>{ch.addEventListener("change",()=>{store.set(ch.dataset.id,ch.checked?"1":"");
  const f=ch.closest(".ex").querySelector(".ex-foot");if(f){f.classList.add("saved");f.innerHTML=I.check+" отмечено";}});});
  view.querySelectorAll("input.splitcell").forEach(t=>{let tm=null;t.addEventListener("input",()=>{store.set(t.dataset.id,t.value);
  const f=t.closest(".ex").querySelector(".ex-foot");clearTimeout(tm);tm=setTimeout(()=>{if(f){f.classList.add("saved");f.innerHTML=I.check+" сохранено";}},500);});});bindGrow();}

function renderHub(){
  brandAccent();topbar.className="topbar hidden";
  const cards=LESSONS.map(l=>{const _real=l.exercises.filter(x=>x.type!=="section");const total=_real.length;const done=_real.filter(exDone).length;
    const meta=total?"":"пока нет упражнений";
    const ring=total?`<span class="epc-ring" style="background:${done===total?l.c:'var(--line-soft)'};color:${done===total?'#fff':'var(--text-faint)'}">${done}/${total}</span>`
      :`<span class="epc-ring" style="background:var(--line-soft);color:var(--text-faint)">—</span>`;
    return`<button class="epc" onclick="openLesson(${l.n},'ex')" ${total?"":'style="opacity:.55"'}>
      <span class="num-chip" style="background:${l.c}">${l.n}</span>
      <span class="epc-body"><span class="epc-title">${l.title}</span>${meta?`<span class="epc-meta">${meta}</span>`:""}</span>${ring}</button>`;}).join("");
  view.innerHTML=`<div class="pad" style="padding-top:calc(var(--safe-t) + 24px)">
    <h1 class="serif" style="font-size:1.85rem;font-weight:600;letter-spacing:-.02em;margin-bottom:4px">Упражнения</h1>
    <p class="ex-note" style="margin:0 0 18px">Выполняйте прямо здесь — ответы сохраняются на устройстве.</p>${cards}</div>`;
}

const SV_CHK=`<svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.8 9.3L10 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function svOpt(qid,i,label,multi,isOther){const on=isOther?(store.get(qid+":other:on")==="1"):(multi?store.get(qid+":"+i)==="1":store.get(qid)===String(i));
  const body=isOther?`Другое: <textarea class="oi" rows="1" data-oi="${qid}" placeholder="напишите">${esc(store.get(qid+":other")||"")}</textarea>`:esc(label);
  return`<div class="sv-opt ${multi?"multi":""} ${on?"sel":""}" data-q="${qid}" data-i="${isOther?"other":i}" data-multi="${multi?1:0}"><span class="m">${SV_CHK}</span><span style="flex:1;min-width:0">${body}</span></div>`;}
function svDots(qid,key){const cur=store.get(key);let d="";for(let v=1;v<=5;v++){d+=`<div class="sv-dot ${cur===String(v)?"sel":""}" data-dot="${key}" data-v="${v}">${v}</div>`;}return d;}
function svQ(q){let h=`<div class="sv-q"><div class="sv-qt">${esc(q.q)}</div>`;
  if(q.hint)h+=`<div class="sv-hint">${esc(q.hint)}</div>`;
  if(q.type==="single"||q.type==="multi"){const m=q.type==="multi";
    h+=q.opts.map((o,i)=>svOpt(q.id,i,o,m,false)).join("");
    if(q.other)h+=svOpt(q.id,-1,"",m,true);}
  else if(q.type==="text"){h+=`<textarea class="sv-ta" data-ta="${q.id}" placeholder="${escAttr(q.ph||"")}">${esc(store.get(q.id)||"")}</textarea>`;
    if(q.consent)h+=`<div style="margin-top:9px">`+svOpt(q.id+":c",0,q.consent,true,false)+`</div>`;}
  else if(q.type==="rate-lessons"){h+=q.rows.map(r=>{const L=LESSONS.find(x=>x.n===r[0]);
    return`<div class="sv-row" style="--c:${L?L.c:"var(--brand)"}"><div class="sv-rn"><span class="rnum">${String(r[0]).padStart(2,"0")}</span>${esc(r[1])}</div><div class="sv-dots">${svDots(q.id,q.id+":"+r[0])}</div></div>`;}).join("");
    if(q.other)h+=`<div style="margin-top:9px">`+svOpt(q.id,-1,"",true,true)+`</div>`;}
  else if(q.type==="rate-one"){h+=`<div class="sv-row"><div class="sv-dots">${svDots(q.id,q.id)}</div></div>`;
    if(q.legend)h+=`<div class="sv-leg"><span>${esc(q.legend[0])}</span><span>${esc(q.legend[1])}</span></div>`;
    if(q.other)h+=`<div style="margin-top:9px">`+svOpt(q.id,-1,"",true,true)+`</div>`;}
  return h+`</div>`;}
function renderSurvey(){return`<div class="sv"><p class="sv-lead">${esc(SURVEY.lead)}</p>${SURVEY.blocks.map(b=>`<div class="sv-block"><div class="sv-bt">${esc(b.title)}</div>${b.questions.map(svQ).join("")}</div>`).join("")}<div class="sv-send"><p>Ответы сохраняются на вашем телефоне и никуда не уходят автоматически. Нажмите кнопку «Отправить в Telegram» и выберите мой профиль, @olga_laska. Или скопируйте текст и вставьте его сами.</p><button class="sv-btn" onclick="svSend()">Отправить в Telegram</button><button class="sv-btn ghost" onclick="svCopy()">Скопировать ответы</button></div></div>`;}
function bindSurvey(){
  view.querySelectorAll(".sv-opt").forEach(o=>{o.addEventListener("click",e=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
    const qid=o.dataset.q,i=o.dataset.i,multi=o.dataset.multi==="1";
    if(multi){const on=!o.classList.contains("sel");o.classList.toggle("sel",on);
      store.set(i==="other"?qid+":other:on":qid+":"+i,on?"1":"0");}
    else{o.closest(".sv-q").querySelectorAll(`.sv-opt[data-q="${qid}"]`).forEach(x=>x.classList.remove("sel"));
      o.classList.add("sel");store.set(qid,i);}});});
  view.querySelectorAll("textarea.oi").forEach(inp=>{autoGrow(inp);
    inp.addEventListener("input",()=>{store.set(inp.dataset.oi+":other",inp.value);autoGrow(inp);});});
  view.querySelectorAll("textarea.sv-ta").forEach(t=>{autoGrow(t);
    t.addEventListener("input",()=>{store.set(t.dataset.ta,t.value);autoGrow(t);});});
  view.querySelectorAll(".sv-dot").forEach(d=>{d.addEventListener("click",()=>{
    const key=d.dataset.dot,was=d.classList.contains("sel");
    d.closest(".sv-dots").querySelectorAll(".sv-dot").forEach(x=>x.classList.remove("sel"));
    if(was){store.set(key,"");}else{d.classList.add("sel");store.set(key,d.dataset.v);}});});}
function svCollect(){const L=["Обратная связь · середина курса «Уроки созависимости»",""];
  SURVEY.blocks.forEach(b=>b.questions.forEach(q=>{
    if(q.type==="single"){const v=store.get(q.id);if(v===null||v==="")return;
      const t=v==="other"?("Другое: "+(store.get(q.id+":other")||"—")):q.opts[+v];
      if(t){L.push(q.q);L.push("· "+t);L.push("");}}
    else if(q.type==="multi"){const picks=[];
      q.opts.forEach((o,i)=>{if(store.get(q.id+":"+i)==="1")picks.push(o);});
      if(store.get(q.id+":other:on")==="1")picks.push("Другое: "+(store.get(q.id+":other")||"—"));
      if(picks.length){L.push(q.q);picks.forEach(p=>L.push("· "+p));L.push("");}}
    else if(q.type==="text"){const v=(store.get(q.id)||"").trim();
      const ok=q.consent&&store.get(q.id+":c:0")==="1";
      if(!v&&!ok)return;
      if(v){L.push(q.q);L.push(v);}
      if(ok)L.push("✓ "+q.consent);
      L.push("");}
    else if(q.type==="rate-lessons"){const rows=q.rows.map(r=>{const v=store.get(q.id+":"+r[0]);
      return v?("· "+r[1]+": "+v+"/5"):null;}).filter(Boolean);
      if(store.get(q.id+":other:on")==="1")rows.push("· Другое: "+(store.get(q.id+":other")||"—"));
      if(rows.length){L.push("Оценка уроков:");rows.forEach(r=>L.push(r));L.push("");}}
    else if(q.type==="rate-one"){const v=store.get(q.id),o=store.get(q.id+":other:on")==="1";
      if(v||o){if(v)L.push(q.q+": "+v+"/5");
        if(o)L.push("Другое: "+(store.get(q.id+":other")||"—"));L.push("");}}
  }));
  return L.join("\n").trim();}
function svCopySync(t){let ok=false;
  try{const a=document.createElement("textarea");a.value=t;a.setAttribute("readonly","");
    a.style.position="fixed";a.style.top="0";a.style.left="0";a.style.opacity="0";
    document.body.appendChild(a);
    const sel=document.getSelection();const old=sel.rangeCount>0?sel.getRangeAt(0):null;
    a.focus();a.select();a.setSelectionRange(0,t.length);
    ok=document.execCommand("copy");
    document.body.removeChild(a);
    if(old){sel.removeAllRanges();sel.addRange(old);}
  }catch(e){ok=false;}
  try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).catch(()=>{});ok=true;}}catch(e){}
  return ok;}
function svSend(){const t=svCollect();
  if(t.split("\n").length<3){toast("Сначала ответьте хотя бы на один вопрос");return;}
  svCopySync(t);
  const enc=encodeURIComponent(t);
  let url,msg;
  if(enc.length<3500){url="https://t.me/share/url?url="+enc;msg="Выберите мой профиль и нажмите отправить";}
  else{url="https://t.me/olga_laska";msg="Ответы скопированы. Вставьте их в чат";}
  toast(msg);
  const w=window.open(url,"_blank");
  if(!w||w.closed||typeof w.closed==="undefined"){location.href=url;}}
function svCopy(){const t=svCollect();
  if(t.split("\n").length<3){toast("Сначала ответьте хотя бы на один вопрос");return;}
  const done=()=>toast("Скопировано");
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(()=>fb());}else{fb();}
  function fb(){const a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();
    try{document.execCommand("copy");}catch(e){}document.body.removeChild(a);done();}}
function openSurvey(){state.tab="org";state.lesson=null;render();
  setTimeout(()=>{const a=view.querySelector(".acc.sv-hi");if(!a)return;
    a.classList.add("open");a.scrollIntoView({block:"start",behavior:"smooth"});},60);}
function svHash(){const h=(location.hash||"").toLowerCase();
  if(h==="#opros"||h==="#survey"||h==="#feedback"){openSurvey();return true;}return false;}
window.addEventListener("hashchange",svHash);
function renderOrg(){
  brandAccent();topbar.className="topbar hidden";
  view.innerHTML=`<div class="pad" style="padding-top:calc(var(--safe-t) + 24px)">
    <h1 class="serif" style="font-size:1.85rem;font-weight:600;letter-spacing:-.02em;margin-bottom:14px">Оргмоменты</h1>
    <div class="org-block">
      <div class="org-row"><span class="or-ico">${I.cal}</span><span><span class="or-k">Когда</span><br><span class="or-v">Воскресенье, 12:00</span></span></div>
      <div class="org-row"><span class="or-ico">${I.cam}</span><span><span class="or-k">Где</span><br><span class="or-v">Zoom</span></span></div>
      <div class="org-row"><span class="or-ico">${I.clock}</span><span><span class="or-k">Длительность</span><br><span class="or-v">90 минут</span></span></div>
    </div>
    <div class="acc sv-hi"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Обратная связь · середина курса</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 18px">${renderSurvey()}</div></div></div>
    <div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Опоздания</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Пожалуйста, старайтесь не опаздывать. Если вы понимаете, что не успеваете подключиться вовремя, лучше тогда посмотреть встречу в записи.</p><p>Хорошо бы заходить хотя бы за 10 минут до начала, чтобы спокойно проверить интернет, звук, наушники и всё остальное.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Качество связи</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Если у вас плохой сигнал, сильное эхо, хрипит звук или вас не слышно, к сожалению, я не смогу полноценно взаимодействовать с вами во время встречи.</p><p>У нас ограниченный тайминг — 90 минут, плюс встреча записывается, поэтому у нас не будет возможности долго решать технические проблемы прямо в процессе.</p><p>Поэтому по возможности подключайтесь с наушниками и нормальным интернетом.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Состояние и пространство</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Отдельно хочется сказать про состояние. Важно, чтобы у вас была возможность хотя бы относительно спокойно присутствовать эти 90 минут.</p><p>Хорошо, если перед встречей вы успеете поесть, немного выдохнуть, настроиться и не будете находиться в сильной спешке или параллельно делать ещё десять дел.</p><p>Также стоит находиться в спокойном, закрытом пространстве. Во время встречи лучше не водить машину, не гулять по улице, не заниматься бытовыми делами и не отвлекаться постоянно на что-то ещё.</p><p>Именно поэтому необходимо, чтобы у вас была включена камера. Идеально — ноутбук, наушники и какое-то удобное положение, в котором вы сможете спокойно присутствовать в процессе.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Чат и вопросы</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Группового чата у нас не будет. Если у вас появляются вопросы после встречи, вы можете писать мне лично: <a href="https://t.me/olga_laska" target="_blank" rel="noopener" style="color:var(--c);font-weight:600;text-decoration:underline;text-underline-offset:2px">@olga_laska</a>.</p><p>Дальше я либо стараюсь ответить на них на следующей встрече, либо делаю какой-то общий ответ в канале.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Записи встреч</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Ссылка на запись после каждой встречи будет отправляться в канал.</p><p>Точно записи будут храниться на Яндекс Диске, а если позволит VPN и скорость, возможно, я буду дополнительно загружать их прямо в Телеграм. Но это не обещаю.</p><p>Записи будут доступны 6 месяцев.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Тайминг и структура</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Встреча длится 90 минут. Обычно примерно от 45 минут до часа занимает информационная часть, где в основном говорю я.</p><p>И ещё примерно от 30 до 45 минут — это упражнения, обсуждения, вопросы и интерактивная часть.</p><p>И здесь мне хочется заранее предупредить о важном моменте. Так как времени у нас не очень много, иногда я могу кого-то останавливать, сокращать ответ, перенаправлять обсуждение или возвращать группу к теме.</p><p>У кого-то это может вызывать сложные чувства: ощущение, что перебили, недослушали или остановили. Но я делаю это не потому, что ваш опыт неважен, а потому что мне важно сохранять структуру встречи и удерживать группу.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Участие</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Участие в упражнениях всегда добровольное. Если вы не готовы чем-то делиться, вы можете не отвечать или пропустить упражнение. Просто сказав: пропускаю.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Конфиденциальность</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Очень важно соблюдать конфиденциальность. Всё, что участники рассказывают о себе на встречах, остаётся внутри группы.</p></div></div></div><div class="acc"><button class="acc-h" onclick="this.closest('.acc').classList.toggle('open')"><span>Важное уточнение</span><span class="acc-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></button><div class="acc-body"><div class="content" style="padding:0 18px 15px"><p>Группа не заменяет личную терапию или кризисную помощь. Это всё-таки формат встреч, где я делюсь своим взглядом, материалом, упражнениями и наблюдениями, а не полноценная групповая терапия.</p></div></div></div></div>`;
  bindSurvey();
}

function renderTabbar(){const items=[{k:"lessons",label:"Уроки",ico:I.lessons},{k:"exercises",label:"Упражнения",ico:I.ex},{k:"org",label:"Оргмоменты",ico:I.org}];
  const active=state.lesson?"lessons":state.tab;

let tt=null;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),1600);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escAttr(s){return esc(s).replace(/"/g,"&quot;");}
if(!svHash())render();
